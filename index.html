async function fetchIntlTripInfo(){
  const desc=(document.getElementById('f-trip-desc')||{}).value||'';
  if(!desc){ document.getElementById('itSmartStatus').textContent='Enter a trip description first.'; return; }
  const claudeKey=localStorage.getItem('claude_key')||CLAUDE_KEY_DEFAULT;

  document.getElementById('itSmartStatus').textContent='Thinking…';
  try{
    // Resolve which model to use — fetch the list and pick the cheapest/fastest available
    let modelId='claude-3-haiku-20240307';
    try{
      const mRes=await fetch('https://api.anthropic.com/v1/models',{
        headers:{'x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}
      });
      if(mRes.ok){
        const mData=await mRes.json();
        const ids=(mData.data||[]).map(m=>m.id);
        // Prefer haiku (cheapest/fastest), then sonnet, then anything
        const haiku=ids.find(id=>id.toLowerCase().includes('haiku'));
        const sonnet=ids.find(id=>id.toLowerCase().includes('sonnet'));
        modelId=haiku||sonnet||ids[0]||modelId;
      }
    }catch(_){}
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':claudeKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:modelId,
        max_tokens:800,
        messages:[{role:'user',content:`For this trip destination: "${desc}"\n\nYou must respond with ONLY a valid JSON object. No prose, no markdown, no code blocks. Just the raw JSON.\n\nRequired JSON keys:\n- "bestTime": string, best months/season to visit\n- "tripDuration": string, recommended trip length (e.g. "7-10 days")\n- "mustSee": string, top 3-5 must-see places separated by newlines\n- "weather": string, brief weather description\n- "locationQuery": string, main destination name in English for image search\n\nExample format:\n{"bestTime":"April to June","tripDuration":"7-10 days","mustSee":"Eiffel Tower\\nLouvre Museum\\nVersailles","weather":"Mild, 15-25°C in summer","locationQuery":"Paris France"}`}]
      })
    });
    if(!res.ok){
      const errText=await res.text();
      document.getElementById('itSmartStatus').textContent=`HTTP ${res.status}: ${errText.slice(0,150)}`;
      return;
    }
    const data=await res.json();
    if(data.type==='error'||data.error){ document.getElementById('itSmartStatus').textContent='API error: '+(data.error?.message||JSON.stringify(data.error)); return; }
    if(!data.content||!data.content[0]){ document.getElementById('itSmartStatus').textContent='Empty response (type='+data.type+').'; return; }
    let info;
    const rawText=data.content[0].text||'';
    try{
      // Try direct parse first, then strip markdown fences, then extract JSON block
      let cleaned=rawText.trim();
      if(cleaned.startsWith('```')){
        cleaned=cleaned.replace(/^```[a-z]*\n?/i,'').replace(/```\s*$/,'').trim();
      }
      // Try to extract a JSON object anywhere in the text
      if(!cleaned.startsWith('{')){
        const m=rawText.match(/\{[\s\S]*\}/);
        if(m) cleaned=m[0];
      }
      info=JSON.parse(cleaned);
    }catch(_){
      document.getElementById('itSmartStatus').textContent='Parse error — raw: '+rawText.slice(0,200);
      return;
    }

    if(info.bestTime)     setField('f-best-time',info.bestTime);
    if(info.tripDuration) setField('f-trip-duration',info.tripDuration);
    if(info.mustSee)      { const el=document.getElementById('f-must-see'); if(el) el.value=info.mustSee; }
    if(info.weather)      setField('f-weather',info.weather);

    // Auto-fill title from location if blank
    if(info.locationQuery&&!v('f-title')) setField('f-title',info.locationQuery);

    // Fetch cover image via Google Places
    const placesKey=localStorage.getItem('places_key');
    if(placesKey&&info.locationQuery){
      document.getElementById('itSmartStatus').textContent='Fetching cover image…';
      try{
        const pr=await fetch('https://places.googleapis.com/v1/places:searchText',{
          method:'POST',
          headers:{'Content-Type':'application/json','X-Goog-Api-Key':placesKey,
            'X-Goog-FieldMask':'places.photos'},
          body:JSON.stringify({textQuery:info.locationQuery,languageCode:'en'})
        });
        const pd=await pr.json();
        const photo=((pd.places||[])[0]||{}).photos;
        if(photo&&photo.length){
          const pmr=await fetch(`https://places.googleapis.com/v1/${photo[0].name}/media?maxWidthPx=800&skipHttpRedirect=true&key=${placesKey}`);
          const pmd=await pmr.json();
          if(pmd.photoUri) setFormPoster(pmd.photoUri);
        }
      }catch(_){}
    }
    document.getElementById('itSmartStatus').textContent='✓ Done! All fields are editable.';
  }catch(e){ document.getElementById('itSmartStatus').textContent='Error: '+e.message; }
}

async function fetchProductInfo(url){
  // 1️⃣ Try Microlink — headless-browser extraction, no API key needed
  try{
    const mlRes=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url)+'&palette=false&audio=false&video=false&iframe=false');
    if(mlRes.ok){
      const ml=await mlRes.json();
      if(ml.status==='success'&&ml.data){
        const d=ml.data;
        const title=(d.title||'').slice(0,120).trim();
        const image=d.image?.url||d.screenshot?.url||'';
        const desc=(d.description||'').slice(0,400).trim();
        const price=d.price||'';
        if(title||image) return {title,image,desc,price};
      }
    }
  }catch(_){}

  // 2️⃣ Fallback: JSONLink open-graph extractor
  try{
    const jlRes=await fetch('https://jsonlink.io/api/extract?url='+encodeURIComponent(url));
    if(jlRes.ok){
      const jl=await jlRes.json();
      const title=(jl.title||'').slice(0,120).trim();
      const image=(jl.images&&jl.images[0])||'';
      const desc=(jl.description||'').slice(0,400).trim();
      if(title||image) return {title,image,desc,price:''};
    }
  }catch(_){}

  return null;
}

// NIS ⇄ USD conversion
let _ilsRate=null;
async function getIlsRate(){
  if(_ilsRate) return _ilsRate;
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=ILS',{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    _ilsRate=d.rates&&d.rates.ILS;
  }catch(_){}
  return _ilsRate||3.7;
}
window.convertStuffPrice=async function(){
  const input=document.getElementById('f-price');
  const status=document.getElementById('priceConvStatus');
  if(!input) return;
  const raw=input.value.trim();
  if(!raw){ if(status) status.textContent='Enter a price first.'; return; }
  const num=parseFloat(raw.replace(/[^0-9.]/g,''));
  if(!num||isNaN(num)){ if(status) status.textContent='Could not read a number.'; return; }
  if(status) status.textContent='Getting rate…';
  const rate=await getIlsRate();
  const rateLabel=`(1 USD = ₪${rate.toFixed(2)})`;
  const isNis=/[₪]|(nis|ils)\s*$/i.test(raw);
  const isUsd=/[$]|(usd)\s*$/i.test(raw);
  if(isUsd&&!isNis){
    const nis=(num*rate).toFixed(2);
    input.value=`₪${nis}`;
    if(status) status.textContent=`$${num} → ₪${nis} ${rateLabel}`;
  } else {
    // NIS (explicit or assumed) → USD
    const usd=(num/rate).toFixed(2);
    input.value=`$${usd}`;
    if(status) status.textContent=`₪${num} → $${usd} ${rateLabel}`;
  }
};

async function fetchFromMapsLocalTrip(){
  const urlEl=document.getElementById('f-maps');
  const url=urlEl?urlEl.value.trim():'';
  if(!url){ document.getElementById('ltMapsStatus').textContent='Paste a Google Maps link first.'; return; }
  const key=localStorage.getItem('places_key');
  if(!key){ document.getElementById('ltMapsStatus').textContent='Save a Google Places API key first.'; return; }
  const nameMatch=url.match(/\/maps\/place\/([^/@?#]+)/);
  const query=nameMatch?decodeURIComponent(nameMatch[1].replace(/\+/g,' ')):'';
  if(!query){ document.getElementById('ltMapsStatus').textContent='Could not read place name from URL.'; return; }
  document.getElementById('ltMapsStatus').textContent='Searching…';
  try{
    const res=await fetch('https://places.googleapis.com/v1/places:searchText',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,
        'X-Goog-FieldMask':'places.displayName,places.addressComponents,places.photos,places.location'},
      body:JSON.stringify({textQuery:query,languageCode:'en'})
    });
    const data=await res.json();
    if(data.error){ document.getElementById('ltMapsStatus').textContent='API error: '+data.error.message; return; }
    const place=(data.places||[])[0];
    if(!place){ document.getElementById('ltMapsStatus').textContent='No results found.'; return; }
    if(place.displayName) setField('f-title',place.displayName.text);
    let region='';
    (place.addressComponents||[]).forEach(comp=>{
      if(comp.types.includes('administrative_area_level_1')) region=comp.longText;
    });
    if(region) setField('f-region',region);
    // Store location for commute calc
    if(place.location) window._ltPlaceLocation=place.location;
    // Cover photo
    if(place.photos&&place.photos.length){
      document.getElementById('ltMapsStatus').textContent='Fetching image…';
      try{
        const pr=await fetch(`https://places.googleapis.com/v1/${place.photos[0].name}/media?maxWidthPx=800&skipHttpRedirect=true&key=${key}`);
        const pd=await pr.json();
        if(pd.photoUri) setFormPoster(pd.photoUri);
      }catch(_){}
    }
    document.getElementById('ltMapsStatus').textContent='✓ Done! Adjust fields below, then click 🧭 Calculate for commute.';
  }catch(e){ document.getElementById('ltMapsStatus').textContent='Error: '+e.message; }
}

async function calcCommute(){
  const key=localStorage.getItem('routes_key')||ROUTES_KEY_DEFAULT;
  let home=localStorage.getItem('home_address');
  if(!home){
    home=prompt('Enter your home address (stored locally):');
    if(!home) return;
    localStorage.setItem('home_address',home);
  }
  const dest=window._ltPlaceLocation;
  const mapsUrl=(document.getElementById('f-maps')||{}).value||'';
  if(!dest&&!mapsUrl){ document.getElementById('commuteSt').textContent='Fetch place data first.'; return; }
  document.getElementById('commuteSt').textContent='Calculating…';
  try{
    const destination=dest
      ? {location:{latLng:{latitude:dest.latitude,longitude:dest.longitude}}}
      : {address:(document.getElementById('f-title')||{}).value||mapsUrl};
    const res=await fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,
        'X-Goog-FieldMask':'routes.duration,routes.distanceMeters'},
      body:JSON.stringify({origin:{address:home},destination,travelMode:'DRIVE',routingPreference:'TRAFFIC_UNAWARE'})
    });
    const data=await res.json();
    if(data.error){ document.getElementById('commuteSt').textContent='Routes API error — enable it in Google Cloud Console.'; return; }
    const route=(data.routes||[])[0];
    if(!route){ document.getElementById('commuteSt').textContent='No route found.'; return; }
    const secs=parseInt(route.duration)||0;
    const km=Math.round((route.distanceMeters||0)/1000);
    const h=Math.floor(secs/3600), m=Math.round((secs%3600)/60);
    const dur=h>0?`${h}h ${m}min`:`${m}min`;
    const result=`${dur} (${km} km)`;
    setField('f-commute',result);
    document.getElementById('commuteSt').textContent='✓ '+result;
  }catch(e){ document.getElementById('commuteSt').textContent='Error: '+e.message; }
}

  setField('f-author',book.author_name&&book.author_name[0]||'');
  setField('f-year',book.first_publish_year||'');
  setField('f-pages',book.number_of_pages_median||'');

      (item.likedAspects||[]).join('; '),
      (item.favDishes||[]).join('; '),
      item.review||'',
      item.notes||'',
      (item.genres||[]).join('; '),
      item.poster||''
    ].map(val => `"${String(val).replace(/"/g,'""')}"`);
  });

  const csv = [cols.map(c=>`"${c}"`).join(','), ...rows.map(r=>r.join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `wishlist-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Auto Backup (every 24 hours) ────────────────────────────────────────────
function autoBackup(){
  const INTERVAL = 24 * 60 * 60 * 1000;
  const last = parseInt(localStorage.getItem('wl_last_backup') || '0');
  if(Date.now() - last < INTERVAL) return;
  const cols = [
    'Category','Title','Status','Year','Source','Rating','Match',
    'Director','Author','Cuisine','City','Country','Price Range',
    'Visit Date','Done Date','Liked Aspects','Favourite Dishes',
    'Review','Notes','Genres','Poster'
  ];
  const priceLabels={budget:'Up to $30',mid:'$30–$75',upscale:'$75–$150',fine:'Above $150'};
  const rows = items.map(item => {
    const c = getCat(item.cat);
    return [
      c.label, item.title||'', item.status||'', item.year||'',
      (item.source&&item.source!=='N/A') ? item.source : '',
      item.rating||'', item.match||'', item.director||'', item.author||'',
      item.cuisine||'', item.city||'', item.country||'',
      item.priceRange ? (priceLabels[item.priceRange]||item.priceRange) : '',
      item.visitDate||'', item.doneDate||'',
      (item.likedAspects||[]).join('; '), (item.favDishes||[]).join('; '),
      item.review||'', item.notes||'', (item.genres||[]).join('; '), item.poster||''
    ].map(val => `"${String(val).replace(/"/g,'""')}"`);
  });
  const csv = [cols.map(c=>`"${c}"`).join(','), ...rows.map(r=>r.join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `wishlist-backup-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('wl_last_backup', Date.now().toString());
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderContent();
autoBackup();
</script>
