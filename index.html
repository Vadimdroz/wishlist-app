<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wishlist</title>
<link rel="icon" type="image/svg+xml" href="logo.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#0d0d14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wishlist"/>
<link rel="preconnect" href="https://api.fontshare.com"/>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#16161f;--surface2:#1e1e2a;
  --border:rgba(255,255,255,.08);--text:#f0f0f5;--muted:#6b6b8a;
}
body{font-family:'Satoshi',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50}
.export-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:.75rem;font-weight:600;cursor:pointer;transition:.15s}
.export-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.trip-type-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.trip-type-pill{padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:600;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;transition:.15s}
.trip-type-pill.on{background:rgba(59,130,246,.2);color:#93c5fd;border-color:rgba(59,130,246,.4)}
.pdf-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:600;background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25);text-decoration:none;cursor:pointer}
.nav-logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1.1rem;letter-spacing:-.02em;cursor:pointer;user-select:none}
.nav-logo svg{width:34px;height:34px;flex-shrink:0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(13,13,20,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:stretch;padding:0 0 env(safe-area-inset-bottom)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 0 12px;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);transition:.15s;border:none;background:none;position:relative}
.tab-btn.active{color:var(--text)}
.tab-btn.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:#6366f1;border-radius:0 0 2px 2px}
.tab-btn svg{width:20px;height:20px;stroke-width:1.8}
.tab-btn:hover:not(.active){color:rgba(240,240,245,.6)}
.tab-btn-discovery.active{color:#a5b4fc}
.tab-btn-discovery.active::after{background:linear-gradient(90deg,#6366f1,#a78bfa)}

/* DISCOVERY SCREEN */
.discovery-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:20px;min-height:60vh}
.discovery-dandelion{font-size:4rem;line-height:1;filter:drop-shadow(0 0 20px rgba(99,102,241,.4));animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.discovery-title{font-size:1.5rem;font-weight:700;color:var(--text)}
.discovery-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;font-size:.75rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.discovery-desc{font-size:.95rem;color:var(--muted);line-height:1.7;max-width:360px}
.discovery-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:4px}
.discovery-pill{padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

/* CONTENT */
.content{max-width:720px;margin:0 auto;padding:20px 16px 120px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:20px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none}
.search-input{width:100%;padding:10px 12px 10px 36px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:.15s}
.search-input:focus{border-color:rgba(255,255,255,.2)}
.search-input::placeholder{color:var(--muted)}
.search-results-label{font-size:.8rem;color:var(--muted);margin-bottom:12px;letter-spacing:.04em;text-transform:uppercase}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-card{border-radius:16px;overflow:hidden;position:relative;aspect-ratio:4/3;cursor:pointer;border:1px solid var(--border)}
.cat-card img{width:100%;height:100%;object-fit:cover;display:block}
.cat-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.72) 40%,transparent)}
.cat-card-body{position:absolute;bottom:12px;left:12px;right:12px}
.cat-card-label{font-weight:700;font-size:1rem;display:flex;align-items:center;gap:6px}
.cat-card-count{font-size:.75rem;color:rgba(255,255,255,.6);margin-top:2px}
.grid>.cat-card:last-child:nth-child(odd){grid-column:1/-1;aspect-ratio:8/3}

/* SUB TABS */
.sub-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:500;background:var(--surface);border:1px solid var(--border);transition:.15s;cursor:pointer}
.sub-tab.active{background:var(--surface2);border-color:rgba(255,255,255,.18);color:var(--text)}
.sub-tab:not(.active){color:var(--muted)}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:.88rem;padding:4px 0;cursor:pointer}
.back-btn:hover{color:var(--text)}
.section-title{font-size:1.1rem;font-weight:700;flex:1}
.add-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;font-size:.85rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);transition:.15s}
.add-btn:hover{background:var(--surface);border-color:rgba(255,255,255,.15)}

/* ITEM CARDS */
.items-list{display:flex;flex-direction:column;gap:10px}
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.15s}
.item-card:hover{border-color:rgba(255,255,255,.14)}
.item-card-inner{display:flex;gap:0;min-height:0}
.item-card-poster{width:90px;min-width:90px;object-fit:cover;display:block;align-self:stretch}
.item-card-poster-placeholder{width:90px;min-width:90px;align-self:stretch;display:flex;align-items:center;justify-content:center;background:var(--surface2);font-size:1.6rem;opacity:.45}
.item-card-body{padding:12px 14px;flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
.item-card-title{font-weight:700;font-size:.95rem;line-height:1.3}
.item-card-meta{font-size:.78rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.item-card-notes{font-size:.8rem;color:var(--muted);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.item-card-bottom{display:flex;align-items:center;gap:8px;margin-top:auto;padding-top:6px}
.item-card-inline-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.source-tag{font-size:.72rem;color:#fff;font-weight:700;letter-spacing:.01em;display:block;margin-top:6px}
.jdi-btn{margin-left:auto;padding:5px 12px;border-radius:8px;font-size:.78rem;font-weight:600;background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.25);transition:.15s}
.jdi-btn:hover{background:rgba(16,185,129,.25)}
.jdi-done-tag{margin-left:auto;font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.jdi-sheet-head{padding:4px 0 16px}
.jdi-sheet-label{font-size:1.1rem;font-weight:700;color:var(--text)}
.jdi-aspects-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.jdi-aspect{padding:6px 13px;border-radius:20px;font-size:.78rem;font-weight:600;background:var(--surface2);color:var(--muted);border:1px solid var(--border);cursor:pointer;transition:.15s;user-select:none}
.jdi-aspect.on{background:rgba(99,102,241,.18);color:#a5b4fc;border-color:rgba(99,102,241,.4)}
.kindle-link{font-size:.72rem;color:#f59e0b;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:6px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2)}
.kindle-link:hover{background:rgba(245,158,11,.2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:6px;font-size:.7rem;font-weight:600;letter-spacing:.02em}
.badge-year{background:var(--surface2);color:var(--muted)}
.badge-lang{background:var(--surface2);color:var(--muted)}
.badge-pages{background:var(--surface2);color:var(--muted)}
.fit-badge{padding:2px 7px;border-radius:6px;font-size:.68rem;font-weight:700}
.fit-kids{background:rgba(99,102,241,.15);color:#a5b4fc}
.fit-wife{background:rgba(236,72,153,.15);color:#f9a8d4}
/* IMDb badge: yellow label + score */
.imdb-wrap{display:inline-flex;align-items:center;gap:4px}
.badge-imdb-label{background:#f5c518;color:#000;padding:1px 5px;border-radius:4px;font-size:.68rem;font-weight:800;letter-spacing:.02em}
.badge-imdb-score{font-size:.78rem;font-weight:700;color:var(--text)}
/* Metacritic: colored circle + /100 */
.meta-wrap{display:inline-flex;align-items:center;gap:4px}
.badge-meta{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;color:#fff;flex-shrink:0}
.badge-meta-score{font-size:.72rem;font-weight:600;color:var(--muted)}
/* Actor pills */
.actor-pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:500;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
/* Star ratings */
.stars-wrap{display:inline-flex;align-items:center;gap:3px}
.stars-label{font-size:.68rem;font-weight:700;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.s-star{font-size:.85rem;line-height:1;color:#f5c518}
.s-star.off{color:var(--surface2)}
/* Star picker in form */
.star-picker-wrap{display:flex;gap:6px;margin-top:4px}
.sp-star{font-size:1.6rem;cursor:pointer;color:var(--muted);transition:.1s;line-height:1;user-select:none}
.sp-star.on{color:#f5c518}
.sp-star:hover{transform:scale(1.15)}

/* GENRE PILLS */
.genre-pill{padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:600;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.15s;background:transparent}
.genre-pill.on{background:rgba(16,185,129,.15);color:#6ee7b7;border-color:rgba(16,185,129,.3)}
.genre-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}

/* TRAILER */
.trailer-thumb{position:relative;border-radius:10px;overflow:hidden;cursor:pointer;margin-top:6px}
.trailer-thumb img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
.trailer-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35)}
.trailer-play svg{width:48px;height:48px;opacity:.9}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3;display:block;margin-left:auto;margin-right:auto}
.empty p{font-size:.9rem}

/* BOTTOM SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:720px;margin:0 auto;max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;gap:10px;padding:8px 20px 12px;border-bottom:1px solid var(--border)}
.sheet-head-emoji{font-size:1.4rem}
.sheet-title{font-weight:700;font-size:1rem;flex:1}
.sheet-del-btn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;color:var(--muted);transition:.15s}
.sheet-del-btn:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.sheet-body{overflow-y:auto;padding:16px 20px;flex:1}
.sheet-actions{display:flex;gap:10px;padding:12px 20px;border-top:1px solid var(--border)}
.sheet-cancel{flex:1;padding:12px;border-radius:12px;background:var(--surface2);font-size:.9rem;font-weight:600}
.sheet-save{flex:2;padding:12px;border-radius:12px;background:#6366f1;color:#fff;font-size:.9rem;font-weight:600;transition:.15s}
.sheet-save:hover{background:#5254cc}

/* FORM */
.form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.form-row label{font-size:.78rem;color:var(--muted);font-weight:500}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:.15s}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:rgba(255,255,255,.2)}
.form-textarea{resize:vertical;min-height:80px}
.form-row-inline{display:flex;gap:10px}
.form-row-inline .form-row{flex:1}
.smart-btn{width:100%;padding:10px;border-radius:10px;background:rgba(99,102,241,.15);color:#a5b4fc;border:1px solid rgba(99,102,241,.3);font-size:.88rem;font-weight:600;transition:.15s;margin-bottom:14px}
.smart-btn:hover{background:rgba(99,102,241,.25)}
.smart-status{font-size:.78rem;color:var(--muted);text-align:center;margin-top:-10px;margin-bottom:10px;min-height:18px}

/* POSTER SECTION */
.poster-section{margin-bottom:14px}
.poster-section>label{font-size:.78rem;color:var(--muted);font-weight:500;display:block;margin-bottom:6px}
.poster-upload-area{border:1.5px dashed var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:.15s}
.poster-upload-area:hover{border-color:rgba(255,255,255,.18)}
.poster-upload-area p{font-size:.78rem;color:var(--muted);text-align:center}
.poster-url-row{display:flex;gap:6px;margin-top:6px;width:100%}
.poster-url-input{flex:1;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.82rem;outline:none}
.poster-url-btn{padding:7px 12px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);font-size:.82rem;font-weight:600;color:var(--text);cursor:pointer;white-space:nowrap}
.poster-preview{position:relative;display:inline-block}
.poster-preview img{width:90px;aspect-ratio:2/3;object-fit:cover;border-radius:8px;display:block}
.poster-remove{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;font-size:.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;line-height:1}

/* CHECKBOX ROW */
.check-row{display:flex;gap:16px;margin-bottom:14px;flex-wrap:wrap}
.check-item{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem}
.check-item input{width:15px;height:15px;accent-color:#6366f1;cursor:pointer}

/* DETAILED VIEW */
.detail-poster{width:120px;min-width:120px;aspect-ratio:2/3;object-fit:cover;border-radius:12px}
.detail-top{display:flex;gap:14px;margin-bottom:16px}
.detail-info{flex:1;display:flex;flex-direction:column;gap:6px}
.detail-title{font-size:1.1rem;font-weight:700;line-height:1.3}
.detail-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.detail-section{margin-bottom:14px}
.detail-section-label{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.detail-section-value{font-size:.9rem;line-height:1.5}

/* PICKER */
.picker-list{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.picker-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s}
.picker-item:hover{border-color:rgba(255,255,255,.18)}
.picker-item img{width:40px;aspect-ratio:2/3;object-fit:cover;border-radius:6px;background:var(--surface)}
.picker-item-info{flex:1;min-width:0}
.picker-item-title{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.picker-item-sub{font-size:.75rem;color:var(--muted)}

/* OMDB KEY */
.omdb-key-wrap{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:14px}
.omdb-key-wrap p{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.omdb-key-row{display:flex;gap:6px}

/* Stuff mode toggle */
.mode-toggle-wrap{display:flex;gap:6px;margin-top:4px}
.mode-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:.82rem;cursor:pointer;transition:all .15s}
.mode-btn.active{background:rgba(236,72,153,.15);color:#f9a8d4;border-color:rgba(236,72,153,.3)}
/* Research option cards */
.research-option-card{display:flex;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.research-opt-img{width:64px;height:64px;object-fit:cover;border-radius:6px;flex-shrink:0}
.research-opt-body{flex:1;min-width:0}
.research-opt-name{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.research-opt-price{font-size:.8rem;color:#fbbf24;margin-bottom:3px}
.research-opt-desc{font-size:.75rem;color:var(--muted);margin-bottom:6px;line-height:1.4}
.research-opt-actions{display:flex;gap:6px}
</style>
</head>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const CATS = [
  {id:'movies',label:'Movies',emoji:'🎬',color:'#8b5cf6',img:'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=480&h=360&fit=crop&q=80',subs:[]},

  {id:'books',label:'Books',emoji:'📚',color:'#10b981',img:'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=480&h=360&fit=crop&q=80',subs:[]},
  {id:'stuff',label:'Stuff',emoji:'🛍️',color:'#ec4899',img:'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=480&h=360&fit=crop&q=80',subs:[{id:'vadim',label:'Vadim'},{id:'ira',label:'Ira'},{id:'kids',label:'Kids'},{id:'other',label:'Other'}]},

];
const BOOK_GENRES = ['Sci-fi','Health','Business','Investing','History','Biography','Philosophy','Geo-Politics','Self Improvement'];
const YT_KEY = 'AIzaSyCUhLADIiLB4AN5A3wdwXd8X_D8PnOnNBg';
const OMDB_KEY_DEFAULT = '919ea22c';
const ROUTES_KEY_DEFAULT = 'AIzaSyCHKz6hURTGwVC-Ev_BT_ZB8eAwQvod4pE';
const CLAUDE_KEY_DEFAULT = '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';

// ─── State ────────────────────────────────────────────────────────────────────
// Recovery: merge data from all known keys so nothing is lost
(function recoverData(){
  const keys = ['wl_v3','wl_v2','wl_v1','wishlist_items'];
  const seen = new Set();
  let merged = [];
  keys.forEach(k => {
    try {
      const raw = localStorage.getItem(k);
      if(!raw) return;
      const arr = JSON.parse(raw);
      if(!Array.isArray(arr) || !arr.length) return;
      // if this is the old wishlist_items format, map fields
      arr.forEach(item => {
        const id = item.id || item._id || (item.title + item.cat);
        if(seen.has(id)) return;
        seen.add(id);
        // old format used 'category' instead of 'cat', 'name' instead of 'title'
        const mapped = {
          id: item.id || (Date.now().toString(36)+Math.random().toString(36).slice(2)),
          cat: item.cat || item.category || 'movies',
          status: item.status || item.done ? 'done' : 'future',
          title: item.title || item.name || 'Untitled',
          year: item.year || '',
          source: item.source || 'N/A',
          poster: item.poster || item.image || null,
          notes: item.notes || item.description || '',
          ...item
        };
        merged.push(mapped);
      });
    } catch(e){}
  });
  if(merged.length > 0){
    // Save consolidated data back to wl_v3
    localStorage.setItem('wl_v3', JSON.stringify(merged));
  }
})();

let items = JSON.parse(localStorage.getItem('wl_v3') || '[]');
// migrate old 'tv' category
items = items.map(i => {
  if (i.cat !== 'tv') return i;
  return {...i, cat: i.sub === 'tv-show' ? 'tv-shows' : 'movies', sub: null};
});
// migrate old 'trips' category → local-trips / intl-trips
items = items.map(i => {
  if (i.cat !== 'trips') return i;
  return {...i, cat: i.sub === 'israel' ? 'local-trips' : 'intl-trips', sub: null};
});
save();

let tab = 'future', catId = null, editId = null, formSub = null, searchQuery = '';

// ─── Helpers ──────────────────────────────────────────────────────────────────
function save(){ localStorage.setItem('wl_v3', JSON.stringify(items)); }

function buildStarDisplay(value, label){
  const v = parseInt(value)||0;
  if(!v) return null;
  const wrap = el('span','stars-wrap');
  const lbl = el('span','stars-label'); lbl.textContent = label;
  wrap.appendChild(lbl);
  for(let i=1;i<=5;i++){
    const s = el('span','s-star'+(i>v?' off':''));
    s.textContent='★';
    wrap.appendChild(s);
  }
  return wrap;
}

function buildStarPicker(fieldId, label, currentVal){
  const row = el('div','form-row');
  const lbl = document.createElement('label'); lbl.textContent=label; row.appendChild(lbl);
  const picker = el('div','star-picker-wrap'); picker.id=fieldId+'-picker';
  const hidden = document.createElement('input');
  hidden.type='hidden'; hidden.id=fieldId; hidden.value=currentVal||0;
  for(let i=1;i<=5;i++){
    const s = el('span','sp-star'+(i<=(currentVal||0)?' on':''));
    s.textContent='★'; s.dataset.val=i;
    s.onclick=()=>{
      const val=parseInt(s.dataset.val);
      hidden.value=val;
      picker.querySelectorAll('.sp-star').forEach(st=>st.classList.toggle('on',parseInt(st.dataset.val)<=val));
    };
    picker.appendChild(s);
  }
  row.appendChild(picker); row.appendChild(hidden);
  return row;
}

function esc(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function getCat(id){ return CATS.find(c=>c.id===id)||CATS[0]; }

function el(tag,cls){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  return e;
}

function v(id){ return (document.getElementById(id)||{}).value||''; }

function ytVideoId(url){
  const m = (url||'').match(/[?&]v=([^&]+)/);
  return m ? m[1] : null;
}

function buildTrailerThumb(videoId){
  const wrap = el('div','trailer-thumb');
  wrap.onclick = e => {
    e.stopPropagation();
    window.open('https://www.youtube.com/watch?v='+videoId,'_blank');
  };
  const src = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
  const fallback = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
  wrap.innerHTML = `<img src="${src}" onerror="this.src='${fallback}'" loading="lazy"/>
    <div class="trailer-play">
      <svg viewBox="0 0 68 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="68" height="48" rx="10" fill="rgba(0,0,0,.6)"/>
        <polygon points="26,16 50,24 26,32" fill="white"/>
      </svg>
    </div>`;
  return wrap;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function setTab(t){
  tab = t; catId = null; editId = null; formSub = null; searchQuery = '';
  document.getElementById('tabFuture').classList.toggle('active', t==='future');
  document.getElementById('tabDone').classList.toggle('active', t==='done');
  document.getElementById('tabDiscovery').classList.toggle('active', t==='discovery');
  renderContent();
}

function openCat(id){ catId = id; editId = null; formSub = null; searchQuery = ''; renderContent(); }
function goHome(){
  catId = null; editId = null; searchQuery = '';
  if(tab==='discovery'){ setTab('future'); return; }
  renderContent();
}

// ─── Root render ──────────────────────────────────────────────────────────────
function renderContent(){
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Discovery tab — full-screen coming soon
  if(tab === 'discovery'){
    const scr = el('div','discovery-screen');
    scr.innerHTML = `
      <div class="discovery-dandelion">🌬️</div>
      <span class="discovery-badge">✦ Coming Soon</span>
      <div class="discovery-title">Discover What's Next</div>
      <p class="discovery-desc">Discovery will learn from your wishlist — your ratings, the genres and directors you love, what you've already seen and read — and surface personalised recommendations across every category.</p>
      <div class="discovery-pills">
        <span class="discovery-pill">🎬 Movies for you</span>
        <span class="discovery-pill">📺 Shows to binge</span>
        <span class="discovery-pill">📚 Your next read</span>
        <span class="discovery-pill">✈️ Places to go</span>
        <span class="discovery-pill">🍽️ Restaurants nearby</span>
      </div>`;
    content.appendChild(scr);
    return;
  }

  // Search bar always at top
  const sw = el('div','search-wrap');
  sw.innerHTML = `<svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search all items…" value="${esc(searchQuery)}"/>`;
  content.appendChild(sw);
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderSearchOrView(content);
  });

  renderSearchOrView(content);
}

function renderSearchOrView(content){
  // Remove everything after the search bar
  while(content.children.length > 1) content.removeChild(content.lastChild);
  if(searchQuery.trim()){ renderSearchResults(content); return; }
  if(catId){ renderList(content); return; }
  renderGrid(content);
}

// ─── Grid ────────────────────────────────────────────────────────────────────
function renderGrid(content){
  const grid = el('div','grid');
  CATS.forEach(c => {
    const count = items.filter(i => i.cat===c.id && i.status===tab).length;
    const card = el('div','cat-card');
    card.innerHTML = `<img src="${c.img}" loading="lazy" alt="${esc(c.label)}"/>
      <div class="cat-card-overlay"></div>
      <div class="cat-card-body">
        <div class="cat-card-label">${esc(c.label)}</div>
        <div class="cat-card-count">${count} item${count===1?'':'s'}</div>
      </div>`;
    card.onclick = () => openCat(c.id);
    grid.appendChild(card);
  });
  content.appendChild(grid);
}

// ─── Search results ───────────────────────────────────────────────────────────
function renderSearchResults(content){
  const q = searchQuery.trim().toLowerCase();
  const matched = items.filter(i => {
    if(i.status !== tab) return false;
    return (i.title||'').toLowerCase().includes(q)
      || (i.notes||'').toLowerCase().includes(q)
      || (i.synopsis||'').toLowerCase().includes(q)
      || (i.actors||'').toLowerCase().includes(q)
      || (i.author||'').toLowerCase().includes(q)
      || (i.source||'').toLowerCase().includes(q);
  });
  const lbl = el('div','search-results-label');
  lbl.textContent = `${matched.length} result${matched.length===1?'':'s'} for "${searchQuery}"`;
  content.appendChild(lbl);
  if(!matched.length){ content.appendChild(emptyState('No items found')); return; }
  const list = el('div','items-list');
  matched.forEach(item => {
    const c = getCat(item.cat);
    list.appendChild(buildItemCard(item, c));
  });
  content.appendChild(list);
}

// ─── List view ───────────────────────────────────────────────────────────────
function renderList(content){
  const c = getCat(catId);

  // Section header
  const hdr = el('div','section-header');
  const back = el('button','back-btn');
  back.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> All`;
  back.onclick = goHome;
  const title = el('span','section-title');
  title.textContent = c.label;
  const addBtn = el('button','add-btn');
  addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add`;
  addBtn.onclick = () => openForm(null);
  hdr.appendChild(back); hdr.appendChild(title); hdr.appendChild(addBtn);
  content.appendChild(hdr);

  // Sub tabs
  if(c.subs.length){
    const stabs = el('div','sub-tabs');
    const allTab = el('button','sub-tab'+(formSub===null?' active':''));
    allTab.textContent = 'All';
    allTab.onclick = () => { formSub=null; renderSearchOrView(content); };
    stabs.appendChild(allTab);
    c.subs.forEach(s => {
      const st = el('button','sub-tab'+(formSub===s.id?' active':''));
      st.textContent = s.label;
      st.onclick = () => { formSub=s.id; renderSearchOrView(content); };
      stabs.appendChild(st);
    });
    content.appendChild(stabs);
  }

  // Filter items
  let list = items.filter(i => i.cat===catId && i.status===tab);
  if(formSub) list = list.filter(i => i.sub===formSub);
  if(!list.length){ content.appendChild(emptyState('No items yet')); return; }
  const ul = el('div','items-list');
  list.forEach(item => ul.appendChild(buildItemCard(item, c)));
  content.appendChild(ul);
}

function makePosterPlaceholder(c){
  const ph = el('div','item-card-poster-placeholder');
  ph.textContent = c.emoji || '🎬';
  return ph;
}

// ─── Item card builder ────────────────────────────────────────────────────────
function buildItemCard(item, c){
  const card = el('div','item-card');
  card.onclick = () => openDetail(item.id);

  const inner = el('div','item-card-inner');

  // Poster for movies, tv-shows, books, restaurants, local-trips, intl-trips, stuff
  if(c.id==='movies'||c.id==='tv-shows'||c.id==='books'||c.id==='restaurants'||c.id==='local-trips'||c.id==='intl-trips'||c.id==='stuff'){
    if(item.poster && item.poster!=='N/A'){
      const img = document.createElement('img');
      img.className = 'item-card-poster';
      img.src = item.poster;
      img.loading = 'lazy';
      img.alt = '';
      img.onerror = () => { img.replaceWith(makePosterPlaceholder(c)); };
      inner.appendChild(img);
    } else {
      inner.appendChild(makePosterPlaceholder(c));
    }
  }

  const body = el('div','item-card-body');

  // Title
  const titleEl = el('div','item-card-title');
  titleEl.textContent = item.title||'Untitled';
  body.appendChild(titleEl);

  // Row 1: director | year | Match/Rating stars — single non-wrapping row
  if(c.id==='movies'||c.id==='tv-shows'){
    const row1 = el('div','item-card-meta');
    row1.style.cssText='flex-wrap:nowrap;overflow:hidden';
    if(item.director&&item.director!=='N/A') row1.insertAdjacentHTML('beforeend',`<span class="actor-pill" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1">${esc(item.director)}</span>`);
    if(item.year) row1.insertAdjacentHTML('beforeend',`<span class="badge badge-year" style="flex-shrink:0">${esc(item.year)}</span>`);
    const starVal = item.status==='future' ? item.match : item.rating;
    const starLabel = item.status==='future' ? 'Match' : 'Rating';
    const starEl = buildStarDisplay(starVal, starLabel);
    if(starEl) row1.appendChild(starEl);
    if(row1.children.length) body.appendChild(row1);
    // Row 2: IMDb + Metacritic
    const row2 = el('div','item-card-meta'); row2.style.marginTop='4px';
    if(item.imdbRating&&item.imdbRating!=='N/A'){
      row2.insertAdjacentHTML('beforeend',`<span class="imdb-wrap"><span class="badge-imdb-label">IMDb</span><span class="badge-imdb-score">${esc(item.imdbRating)}</span></span>`);
    }
    if(item.metacritic&&item.metacritic!=='N/A'){
      const mc = parseInt(item.metacritic,10);
      const mcColor = mc>=61?'#6c3':mc>=40?'#fc3':'#f33';
      row2.insertAdjacentHTML('beforeend',`<span class="meta-wrap"><span class="badge-meta" style="background:${mcColor}">${esc(item.metacritic)}</span><span class="badge-meta-score">/100</span></span>`);
    }
    if(row2.children.length) body.appendChild(row2);
  } else {
    const meta = el('div','item-card-meta');
    if(c.id==='books'&&item.author) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-lang">${esc(item.author)}</span>`);
    if(c.id==='books'&&item.pages) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-pages">${esc(item.pages)}p</span>`);
    if(item.year) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">${esc(item.year)}</span>`);
    const starVal = item.status==='future' ? item.match : item.rating;
    const starLabel = item.status==='future' ? 'Match' : 'Rating';
    const starEl = buildStarDisplay(starVal, starLabel);
    if(starEl) meta.appendChild(starEl);
    if(meta.children.length) body.appendChild(meta);
  }

  // Fit badges for movies/tv-shows
  if((c.id==='movies'||c.id==='tv-shows')&&(item.forKids||item.forWife)){
    const fitRow = el('div','item-card-meta'); fitRow.style.marginTop='4px';
    if(item.forKids) fitRow.insertAdjacentHTML('beforeend','<span class="fit-badge fit-kids">👦 Kids</span>');
    if(item.forWife) fitRow.insertAdjacentHTML('beforeend','<span class="fit-badge fit-wife">💕 Wife</span>');
    body.appendChild(fitRow);
  }

  // Notes (books: nothing; movies/tv: notes only, not synopsis)
  const notes = c.id==='books' ? '' : (item.notes||item.reasons||'');
  if(notes){
    const n = el('div','item-card-notes');
    n.textContent = notes;
    body.appendChild(n);
  }

  const hasSource = item.source && item.source!=='N/A' && item.source!=='';
  const hasKindle = c.id==='books' && item.kindleLink;
  const isFuture = item.status==='future';

  if(c.id==='books'){
    // Row A: genre pills (left) | Kindle button (right)
    const hasGenres = item.genres && item.genres.length;
    if(hasGenres || hasKindle){
      const genreRow = el('div','item-card-inline-row'); genreRow.style.marginTop='6px';
      if(hasGenres){
        const gw = el('div','item-card-meta');
        item.genres.forEach(g => gw.insertAdjacentHTML('beforeend',`<span class="genre-pill on" style="pointer-events:none">${esc(g)}</span>`));
        genreRow.appendChild(gw);
      }
      if(hasKindle){
        const kl = document.createElement('a');
        kl.className='kindle-link'; kl.href=item.kindleLink; kl.target='_blank'; kl.rel='noopener';
        kl.onclick = e => e.stopPropagation();
        kl.innerHTML='📖 Kindle';
        genreRow.appendChild(kl);
      }
      body.appendChild(genreRow);
    }
    // Row B: source tag (left) | JDI / done-date (right)
    if(hasSource || isFuture || item.doneDate){
      const srcRow = el('div','item-card-inline-row'); srcRow.style.marginTop='6px';
      if(hasSource){
        const st = el('span','source-tag'); st.textContent='via '+item.source;
        srcRow.appendChild(st);
      }
      if(isFuture){
        const jdi = el('button','jdi-btn');
        jdi.textContent='✓ Just Did It!';
        jdi.onclick = e => { e.stopPropagation(); markDone(item.id); };
        srcRow.appendChild(jdi);
      } else if(item.doneDate){
        const done = el('span','jdi-done-tag');
        done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`;
        srcRow.appendChild(done);
      }
      body.appendChild(srcRow);
    }
  } else if(c.id==='restaurants'){
    // Cuisine + location row
    const hasCuisine = item.cuisine && item.cuisine!=='';
    const hasLocation = (item.city||'') || (item.country||'');
    if(hasCuisine || hasLocation){
      const metaRow = el('div','item-card-meta'); metaRow.style.marginTop='4px';
      if(hasCuisine) metaRow.insertAdjacentHTML('beforeend',`<span class="genre-pill on" style="pointer-events:none">${esc(item.cuisine)}</span>`);
      if(hasLocation){
        const loc = [item.city, item.country].filter(Boolean).join(', ');
        metaRow.insertAdjacentHTML('beforeend',`<span class="badge badge-year">📍 ${esc(loc)}</span>`);
      }
      body.appendChild(metaRow);
    }
    if(item.notes){
      const n = el('div','item-card-notes'); n.textContent=item.notes; body.appendChild(n);
    }
    // Bottom row: source + maps link + JDI
    const bottom = el('div','item-card-bottom');
    if(hasSource){ const st=el('span','source-tag'); st.textContent='via '+item.source; bottom.appendChild(st); }
    if(item.mapsLink){
      const ml = document.createElement('a');
      ml.className='kindle-link'; ml.href=item.mapsLink; ml.target='_blank'; ml.rel='noopener';
      ml.onclick=e=>e.stopPropagation();
      ml.innerHTML='🗺️ Maps';
      bottom.appendChild(ml);
    }
    if(isFuture){
      const jdi=el('button','jdi-btn'); jdi.textContent='✓ Just Did It!';
      jdi.onclick=e=>{e.stopPropagation();markDone(item.id);}; bottom.appendChild(jdi);
    } else if(item.doneDate){
      const done=el('span','jdi-done-tag');
      done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`;
      bottom.appendChild(done);
    }
    body.appendChild(bottom);
  } else if(c.id==='intl-trips'){
    if(item.tripDesc){ const d=el('div','item-card-notes'); d.style.cssText='font-style:italic;margin-top:4px'; d.textContent=item.tripDesc; body.appendChild(d); }
    const itMeta=el('div','item-card-meta'); itMeta.style.marginTop='4px';
    if(item.bestTime)     itMeta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">🗓 ${esc(item.bestTime)}</span>`);
    if(item.tripDuration) itMeta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">⏱ ${esc(item.tripDuration)}</span>`);
    if(item.weather)      itMeta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">🌤 ${esc(item.weather)}</span>`);
    if(itMeta.children.length) body.appendChild(itMeta);
    const bottom=el('div','item-card-bottom');
    if(hasSource){ const st=el('span','source-tag'); st.textContent='via '+item.source; bottom.appendChild(st); }
    if(isFuture){ const jdi=el('button','jdi-btn'); jdi.textContent='✓ Just Did It!'; jdi.onclick=e=>{e.stopPropagation();markDone(item.id);}; bottom.appendChild(jdi); }
    else if(item.doneDate){ const done=el('span','jdi-done-tag'); done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`; bottom.appendChild(done); }
    body.appendChild(bottom);
  } else if(c.id==='local-trips'){
    // Type + region row
    const ltMeta=el('div','item-card-meta'); ltMeta.style.marginTop='4px';
    if(item.tripType) ltMeta.insertAdjacentHTML('beforeend',`<span class="genre-pill on" style="pointer-events:none">${esc(item.tripType)}</span>`);
    if(item.region)   ltMeta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">📍 ${esc(item.region)}</span>`);
    if(item.commute)  ltMeta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">🚗 ${esc(item.commute)}</span>`);
    if(ltMeta.children.length) body.appendChild(ltMeta);
    if(item.notForKids) body.insertAdjacentHTML('beforeend','<span class="fit-badge" style="background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3);margin-top:4px;display:inline-block">🚫👶 Not for kids</span>');
    if(item.advice){ const a=el('div','item-card-notes'); a.style.cssText='color:#fbbf24;margin-top:3px'; a.textContent='⚠️ '+item.advice; body.appendChild(a); }
    const bottom=el('div','item-card-bottom');
    if(hasSource){ const st=el('span','source-tag'); st.textContent='via '+item.source; bottom.appendChild(st); }
    if(item.mapsLink){ const ml=document.createElement('a'); ml.className='kindle-link'; ml.href=item.mapsLink; ml.target='_blank'; ml.rel='noopener'; ml.onclick=e=>e.stopPropagation(); ml.innerHTML='🗺️ Maps'; bottom.appendChild(ml); }
    if(item.infoLink){ const il=document.createElement('a'); il.className='kindle-link'; il.href=item.infoLink; il.target='_blank'; il.rel='noopener'; il.onclick=e=>e.stopPropagation(); il.innerHTML='🔗 Info'; bottom.appendChild(il); }
    if(item.pdfData){ const pb=el('button','pdf-btn'); pb.onclick=e=>{e.stopPropagation(); const a=document.createElement('a'); a.href=item.pdfData; a.download='trail.pdf'; a.click();}; pb.textContent='📄 PDF'; bottom.appendChild(pb); }
    if(isFuture){ const jdi=el('button','jdi-btn'); jdi.textContent='✓ Just Did It!'; jdi.onclick=e=>{e.stopPropagation();markDone(item.id);}; bottom.appendChild(jdi); }
    else if(item.doneDate){ const done=el('span','jdi-done-tag'); done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`; bottom.appendChild(done); }
    body.appendChild(bottom);
  } else if(c.id==='stuff'){
    const isToBuy=item.mode==='to-buy'||!item.mode;
    const isResearch=item.mode==='to-research';
    // Mode badge
    const modeBadge=el('span','badge badge-year');
    modeBadge.style.cssText=isToBuy?'background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.25)':'background:rgba(99,102,241,.15);color:#818cf8;border:1px solid rgba(99,102,241,.25)';
    modeBadge.textContent=isToBuy?'🛒 To Buy':'🔍 Research';
    const modeRow=el('div','item-card-meta'); modeRow.style.marginTop='4px';
    modeRow.appendChild(modeBadge);
    if(item.sub){ const sub=c.subs.find(s=>s.id===item.sub); if(sub){ const sb=el('span','badge badge-year'); sb.textContent='👤 '+sub.label; modeRow.appendChild(sb); }}
    body.appendChild(modeRow);
    if(isToBuy){
      if(item.price){ const pr=el('div','item-card-meta'); pr.style.marginTop='3px'; pr.insertAdjacentHTML('beforeend',`<span class="badge badge-year" style="color:#fbbf24">💰 ${esc(item.price)}</span>`); body.appendChild(pr); }
      if(item.pros){ const pd=el('div','item-card-notes'); pd.style.cssText='margin-top:3px;color:#86efac'; pd.textContent='✓ '+item.pros.slice(0,80)+(item.pros.length>80?'…':''); body.appendChild(pd); }
      if(item.cons){ const cd=el('div','item-card-notes'); cd.style.cssText='margin-top:2px;color:#fca5a5'; cd.textContent='✗ '+item.cons.slice(0,80)+(item.cons.length>80?'…':''); body.appendChild(cd); }
    } else {
      const cnt=(item.options||[]).length;
      const optBadge=el('span','badge badge-year'); optBadge.textContent=cnt+' option'+(cnt!==1?'s':'');
      const optRow=el('div','item-card-meta'); optRow.style.marginTop='4px'; optRow.appendChild(optBadge); body.appendChild(optRow);
      if(item.researchTopic&&item.researchTopic!==item.title){ const td=el('div','item-card-notes'); td.style.marginTop='3px'; td.textContent=item.researchTopic; body.appendChild(td); }
    }
    if(item.notes){ const nd=el('div','item-card-notes'); nd.textContent=item.notes; body.appendChild(nd); }
    // Product link
    const bottom=el('div','item-card-bottom');
    if(item.productUrl){ const al=document.createElement('a'); al.className='kindle-link'; al.href=item.productUrl; al.target='_blank'; al.rel='noopener'; al.onclick=e=>e.stopPropagation(); al.innerHTML='🔗 View'; bottom.appendChild(al); }
    if(isFuture){ const jdi=el('button','jdi-btn'); jdi.textContent='✓ Done!'; jdi.onclick=e=>{e.stopPropagation();markDone(item.id);}; bottom.appendChild(jdi); }
    else if(item.doneDate){ const done=el('span','jdi-done-tag'); done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`; bottom.appendChild(done); }
    if(bottom.children.length) body.appendChild(bottom);
  } else {
    // Movies / TV / other: source flows naturally, JDI/done-date pushed to bottom
    if(hasSource){
      const st = el('span','source-tag'); st.textContent='via '+item.source;
      body.appendChild(st);
    }
    if(isFuture||item.doneDate){
      const bottom = el('div','item-card-bottom');
      if(isFuture){
        const jdi = el('button','jdi-btn');
        jdi.textContent='✓ Just Did It!';
        jdi.onclick = e => { e.stopPropagation(); markDone(item.id); };
        bottom.appendChild(jdi);
      } else if(item.doneDate){
        const done = el('span','jdi-done-tag');
        done.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> ${esc(item.doneDate)}`;
        bottom.appendChild(done);
      }
      body.appendChild(bottom);
    }
  }

  inner.appendChild(body);
  card.appendChild(inner);

  return card;
}

function emptyState(msg){
  const d = el('div','empty');
  d.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0H4"/></svg><p>${esc(msg)}</p>`;
  return d;
}

// ─── Just Did It sheet ────────────────────────────────────────────────────────
function markDone(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  const c = getCat(item.cat);

  document.getElementById('sheetEmoji').textContent = c.emoji;
  document.getElementById('sheetTitle').textContent = item.title||'Untitled';
  document.getElementById('delBtn').style.display = 'none';

  const body = document.getElementById('sheetBody');
  body.innerHTML = '';

  const hd = el('div','jdi-sheet-head');
  hd.innerHTML = `<span class="jdi-sheet-label">How was it?</span>`;
  body.appendChild(hd);

  const actions = document.getElementById('sheetActions');
  actions.innerHTML = '';
  const cancelBtn = el('button','sheet-cancel');
  cancelBtn.textContent = 'Cancel'; cancelBtn.onclick = closeSheet;
  const saveBtn = el('button','sheet-save');
  saveBtn.innerHTML = '✓ Mark as Past';
  actions.appendChild(cancelBtn); actions.appendChild(saveBtn);

  if(c.id==='restaurants'){
    // ── Date visited ──
    const today = new Date().toISOString().slice(0,10);
    const dateRow = el('div','form-row');
    dateRow.innerHTML = `<label>Date visited</label><input class="form-input" type="date" id="jdi-visit-date" value="${esc(item.visitDate||today)}"/>`;
    body.appendChild(dateRow);

    // ── Star rating ──
    body.appendChild(buildStarPicker('jdi-rating','My Rating', item.rating||0));

    // ── What I liked — restaurant aspects ──
    const RESTO_ASPECTS = ['Atmosphere','Food','Service','Setting'];
    const aspectRow = el('div','form-row');
    const aspectLbl = document.createElement('label'); aspectLbl.textContent='What I liked';
    aspectRow.appendChild(aspectLbl);
    const aspectWrap = el('div','jdi-aspects-wrap');
    const currentAspects = item.likedAspects||[];
    RESTO_ASPECTS.forEach(a => {
      const pill = el('button','jdi-aspect'+(currentAspects.includes(a)?' on':''));
      pill.type='button'; pill.textContent=a;
      pill.onclick=()=>pill.classList.toggle('on');
      aspectWrap.appendChild(pill);
    });
    aspectRow.appendChild(aspectWrap);
    body.appendChild(aspectRow);

    // ── Favourite dishes ──
    const dishList = [...(item.favDishes||[])];
    const dishRow = el('div','form-row');
    const dishLbl = document.createElement('label'); dishLbl.textContent='Favourite dishes';
    dishRow.appendChild(dishLbl);
    const dishWrap = el('div','jdi-aspects-wrap'); dishWrap.id='jdi-dish-wrap';
    function renderDishes(){
      dishWrap.innerHTML='';
      dishList.forEach((d,i)=>{
        const p=el('span','jdi-aspect on'); p.style.cursor='pointer';
        p.innerHTML=`${esc(d)} <span style="margin-left:4px;opacity:.6">×</span>`;
        p.title='Click to remove';
        p.onclick=()=>{dishList.splice(i,1);renderDishes();};
        dishWrap.appendChild(p);
      });
    }
    renderDishes();
    dishRow.appendChild(dishWrap);
    const dishInputRow = el('div'); dishInputRow.style.cssText='display:flex;gap:8px;margin-top:6px';
    const dishInput = document.createElement('input');
    dishInput.className='form-input'; dishInput.placeholder='e.g. Pasta carbonara';
    dishInput.style.flex='1';
    const dishAdd = el('button','poster-url-btn'); dishAdd.type='button'; dishAdd.textContent='+ Add';
    function addDish(){
      const d=dishInput.value.trim(); if(!d) return;
      dishList.push(d); dishInput.value=''; renderDishes();
    }
    dishAdd.onclick=addDish;
    dishInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addDish();}});
    dishInputRow.appendChild(dishInput); dishInputRow.appendChild(dishAdd);
    dishRow.appendChild(dishInputRow);
    body.appendChild(dishRow);

    // ── Price range ──
    const priceRow = el('div','form-row');
    const currentPrice = item.priceRange||'';
    let priceHtml = `<label>Price range (per person)</label><select class="form-input" id="jdi-price">
      <option value="">— select —</option>`;
    [['budget','Up to $30'],['mid','$30–$75'],['upscale','$75–$150'],['fine','Above $150']].forEach(([v,l])=>{
      priceHtml+=`<option value="${v}"${currentPrice===v?' selected':''}>${l}</option>`;
    });
    priceHtml+='</select>';
    priceRow.innerHTML=priceHtml;
    body.appendChild(priceRow);

    // ── Review ──
    const revRow = el('div','form-row');
    revRow.innerHTML=`<label>Review (optional)</label><textarea class="form-textarea" id="jdi-review" placeholder="A few words about the experience…" rows="3">${esc(item.review||'')}</textarea>`;
    body.appendChild(revRow);

    saveBtn.onclick=()=>{
      item.status='done';
      const vd=document.getElementById('jdi-visit-date');
      item.visitDate = vd&&vd.value ? vd.value : today;
      item.doneDate = new Date(item.visitDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      item.rating = parseInt((document.getElementById('jdi-rating')||{}).value)||0;
      item.likedAspects = [...aspectWrap.querySelectorAll('.jdi-aspect.on')].map(p=>p.textContent);
      item.favDishes = [...dishList];
      item.priceRange = (document.getElementById('jdi-price')||{}).value||'';
      item.review = ((document.getElementById('jdi-review')||{}).value||'').trim();
      save(); closeSheet(); renderContent();
    };

  } else {
    // ── Default JDI (movies, tv, books, etc.) ──
    const JDI_ASPECTS = ['Storyline & writing','Direction','Acting','Thrill & excitement','Authenticity & emotion','Style & cinematography'];
    body.appendChild(buildStarPicker('jdi-rating','Your Rating', item.rating||0));
    const aspectRow = el('div','form-row');
    const aspectLbl = document.createElement('label'); aspectLbl.textContent='What stood out?';
    aspectRow.appendChild(aspectLbl);
    const aspectWrap = el('div','jdi-aspects-wrap');
    const currentAspects = item.likedAspects||[];
    JDI_ASPECTS.forEach(a=>{
      const pill=el('button','jdi-aspect'+(currentAspects.includes(a)?' on':''));
      pill.type='button'; pill.textContent=a;
      pill.onclick=()=>pill.classList.toggle('on');
      aspectWrap.appendChild(pill);
    });
    aspectRow.appendChild(aspectWrap);
    body.appendChild(aspectRow);
    const revRow=el('div','form-row');
    revRow.innerHTML=`<label>Anything else? (optional)</label><textarea class="form-textarea" id="jdi-review" placeholder="A few words about what made it great…" rows="3">${esc(item.review||'')}</textarea>`;
    body.appendChild(revRow);

    saveBtn.onclick=()=>{
      item.status='done';
      item.doneDate=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
      const ratingEl=document.getElementById('jdi-rating');
      if(ratingEl) item.rating=parseInt(ratingEl.value)||0;
      const reviewEl=document.getElementById('jdi-review');
      if(reviewEl) item.review=reviewEl.value.trim();
      item.likedAspects=[...aspectWrap.querySelectorAll('.jdi-aspect.on')].map(p=>p.textContent);
      save(); closeSheet(); renderContent();
    };
  }

  openSheet();
}

// ─── Delete ───────────────────────────────────────────────────────────────────
function deleteItem(){
  if(!editId) return;
  if(!confirm('Delete this item?')) return;
  items = items.filter(i=>i.id!==editId);
  save(); closeSheet(); renderContent();
}

// ─── Detail view ──────────────────────────────────────────────────────────────
function openDetail(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  editId = id;
  const c = getCat(item.cat);

  document.getElementById('sheetEmoji').textContent = c.emoji;
  document.getElementById('sheetTitle').textContent = item.title||'Untitled';
  document.getElementById('delBtn').style.display = 'flex';

  const body = document.getElementById('sheetBody');
  body.innerHTML = '';

  // Top: poster + info
  const hasMedia = (c.id==='movies'||c.id==='tv-shows'||c.id==='books') && item.poster && item.poster!=='N/A';
  if(hasMedia){
    const top = el('div','detail-top');
    const img = document.createElement('img');
    img.className='detail-poster'; img.src=item.poster; img.alt='';
    top.appendChild(img);
    top.appendChild(buildDetailInfo(item,c));
    body.appendChild(top);
  } else {
    body.appendChild(buildDetailInfo(item,c));
  }

  // International trips detail
  if(c.id==='intl-trips'){
    if(item.tripDesc)     appendSection(body,'Trip description',item.tripDesc);
    if(item.bestTime)     appendSection(body,'Best time of year',item.bestTime);
    if(item.tripDuration) appendSection(body,'Trip duration',item.tripDuration);
    if(item.mustSee){
      const s=el('div','detail-section');
      const sl=el('div','detail-section-label'); sl.textContent='Must-see destinations'; s.appendChild(sl);
      const sv=el('div','detail-section-value'); sv.style.whiteSpace='pre-wrap'; sv.textContent=item.mustSee;
      s.appendChild(sv); body.appendChild(s);
    }
    if(item.weather)  appendSection(body,'Weather',item.weather);
    if(item.notes)    appendSection(body,'Notes',item.notes);
  }

  // Local-trips detail
  if(c.id==='local-trips'){
    if(item.tripType) appendSection(body,'Type',item.tripType);
    if(item.region)   appendSection(body,'Region',item.region);
    if(item.commute)  appendSection(body,'Commute from home',item.commute);
    if(item.tripType==='Nature'){
      if(item.trailHours) appendSection(body,'Trail length',item.trailHours+' hrs');
      if(item.hasWater!=null) appendSection(body,'Water on trail',item.hasWater?'Yes':'No');
      if(item.bestSeason)  appendSection(body,'Best time of year',item.bestSeason);
      if(item.notForKids)  appendSection(body,'Suitability','🚫👶 Not suitable for kids');
    }
    if(item.description) appendSection(body,'Description',item.description);
    if(item.advice)      appendSection(body,'⚠️ Important advice',item.advice);
    if(item.infoLink){
      const s=el('div','detail-section'); const sl=el('div','detail-section-label'); sl.textContent='Additional Info'; s.appendChild(sl);
      const a=document.createElement('a'); a.href=item.infoLink; a.target='_blank'; a.rel='noopener'; a.className='kindle-link'; a.textContent='🔗 Open link';
      s.appendChild(a); body.appendChild(s);
    }
    if(item.mapsLink){
      const s=el('div','detail-section'); const sl=el('div','detail-section-label'); sl.textContent='Google Maps'; s.appendChild(sl);
      const a=document.createElement('a'); a.href=item.mapsLink; a.target='_blank'; a.rel='noopener'; a.className='kindle-link'; a.textContent='🗺️ Open in Maps';
      s.appendChild(a); body.appendChild(s);
    }
    if(item.pdfData){
      const s=el('div','detail-section'); const sl=el('div','detail-section-label'); sl.textContent='PDF'; s.appendChild(sl);
      const pb=el('button','pdf-btn'); pb.textContent='📄 Download PDF';
      pb.onclick=()=>{ const a=document.createElement('a'); a.href=item.pdfData; a.download='trail.pdf'; a.click(); };
      s.appendChild(pb); body.appendChild(s);
    }
  }

  // Restaurant-specific detail
  if(c.id==='restaurants'){
    if(item.cuisine)  appendSection(body,'Cuisine',item.cuisine);
    const loc = [item.city, item.country].filter(Boolean).join(', ');
    if(loc) appendSection(body,'Location',loc);
    if(item.mapsLink){

  // Synopsis

  // Review (from Just Did It)
  if(c.id==='restaurants'){
    if(item.visitDate) appendSection(body,'Visited', new Date(item.visitDate+'T12:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}));

  if(item.likedAspects&&item.likedAspects.length){

  // Notes
  const notes = item.notes||item.reasons||'';

  // Source
  if(item.source&&item.source!=='N/A'&&item.source!==''){

  }

  // Genres
  if(c.id==='books'&&item.genres&&item.genres.length){

  if(c.id==='books'&&item.kindleLink){

  // Trailer
  if(item.trailer){

  cancelBtn.textContent = 'Close'; cancelBtn.onclick = closeSheet;
  const editBtn = el('button','sheet-save');
  editBtn.textContent = 'Edit'; editBtn.onclick = () => openForm(id);
  actions.appendChild(cancelBtn); actions.appendChild(editBtn);

  openSheet();
}

function appendSection(body, label, value){
  const s = el('div','detail-section');
  const sl = el('div','detail-section-label'); sl.textContent=label; s.appendChild(sl);
  const sv = el('div','detail-section-value'); sv.textContent=value; s.appendChild(sv);
  body.appendChild(s);
}

function buildDetailInfo(item, c){
  const info = el('div','detail-info');
  const titleEl = el('div','detail-title'); titleEl.textContent=item.title||'Untitled'; info.appendChild(titleEl);
  if(c.id==='movies'||c.id==='tv-shows'){
    // Row 1: director | actors | year
    const row1 = el('div','detail-meta');
    if(item.director&&item.director!=='N/A') row1.insertAdjacentHTML('beforeend',`<span class="actor-pill">${esc(item.director)}</span>`);
    if(item.actors&&item.actors!=='N/A') row1.insertAdjacentHTML('beforeend',`<span class="actor-pill">${esc(item.actors)}</span>`);
    if(item.year) row1.insertAdjacentHTML('beforeend',`<span class="badge badge-year">${esc(item.year)}</span>`);
    if(row1.children.length) info.appendChild(row1);
    // Row 2: IMDb + Metacritic + fit badges
    const row2 = el('div','detail-meta');
    if(item.imdbRating&&item.imdbRating!=='N/A'){
      row2.insertAdjacentHTML('beforeend',`<span class="imdb-wrap"><span class="badge-imdb-label">IMDb</span><span class="badge-imdb-score">${esc(item.imdbRating)}</span></span>`);
    }
    if(item.metacritic&&item.metacritic!=='N/A'){
      const mc=parseInt(item.metacritic,10);
      const mcColor=mc>=61?'#6c3':mc>=40?'#fc3':'#f33';
      row2.insertAdjacentHTML('beforeend',`<span class="meta-wrap"><span class="badge-meta" style="background:${mcColor}">${esc(item.metacritic)}</span><span class="badge-meta-score">/100</span></span>`);
    }
    if(item.forKids) row2.insertAdjacentHTML('beforeend','<span class="fit-badge fit-kids">👦 Kids</span>');
    if(item.forWife) row2.insertAdjacentHTML('beforeend','<span class="fit-badge fit-wife">💕 Wife</span>');
    const dStarVal = item.status==='future' ? item.match : item.rating;
    const dStarLabel = item.status==='future' ? 'Match' : 'Rating';
    const dStarEl = buildStarDisplay(dStarVal, dStarLabel);
    if(dStarEl) row2.appendChild(dStarEl);
    if(row2.children.length) info.appendChild(row2);
  } else {
    const meta = el('div','detail-meta');
    if(item.year) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-year">${esc(item.year)}</span>`);
    if(item.language&&item.language!=='N/A') meta.insertAdjacentHTML('beforeend',`<span class="badge badge-lang">${esc(item.language)}</span>`);
    if(item.pages) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-pages">${esc(item.pages)}p</span>`);
    if(item.author) meta.insertAdjacentHTML('beforeend',`<span class="badge badge-lang">${esc(item.author)}</span>`);
    if(meta.innerHTML) info.appendChild(meta);
  }
  return info;
}

function openForm(id){
  editId = id;
  const item = id ? items.find(i=>i.id===id) : null;
  const c = getCat(catId||(item&&item.cat)||'movies');
  if(item) catId = item.cat;

  document.getElementById('sheetEmoji').textContent = c.emoji;
  document.getElementById('sheetTitle').textContent = id ? 'Edit '+c.label : 'Add '+c.label;
  document.getElementById('delBtn').style.display = 'none';

  const body = document.getElementById('sheetBody');
  body.innerHTML = '';

  actions.innerHTML = '';
  const cancelBtn = el('button','sheet-cancel');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => { if(id) openDetail(id); else closeSheet(); };
  const saveBtn = el('button','sheet-save');
  saveBtn.textContent = 'Save'; saveBtn.onclick = saveItem;

function appendFormRow(body, label, inputId, type, value){

  }

}

function buildSourceField(body, c, sourceVal){
  const presets = {
    'movies':   ['Filmspotting','Dan Murrell','Geekonomy','X/Twitter'],
    'tv-shows': ['Filmspotting','Dan Murrell','Geekonomy','X/Twitter'],
    'books':    ['Geekonomy','Acquired'],
  };
  const opts = presets[c.id];
  if(!opts){
    appendFormRow(body,'Source of Recommendation (optional)','f-source','input',sourceVal);
    return;
  }

  const knownOpt = opts.find(o => o === sourceVal);
  const selectVal = knownOpt ? knownOpt : (sourceVal ? 'Other' : '');
  const otherVal  = (!knownOpt && sourceVal) ? sourceVal : '';

  // Dropdown row
  const row = el('div','form-row');
  let html = `<label>Source of Recommendation (optional)</label>
    <select class="form-input" id="f-source-pick">
      <option value="">— select —</option>`;
  opts.forEach(o => {
    html += `<option value="${esc(o)}"${o===selectVal?' selected':''}>${esc(o)}</option>`;
  });
  html += `<option value="Other"${selectVal==='Other'?' selected':''}>Other</option></select>`;
  row.innerHTML = html;
  body.appendChild(row);

  // Free-text row (shown when Other is selected)
  const otherRow = el('div','form-row');
  otherRow.id = 'f-source-other-row';
  otherRow.style.display = selectVal==='Other' ? '' : 'none';
  otherRow.innerHTML = `<label>Specify source</label><input class="form-input" id="f-source-other" value="${esc(otherVal)}" placeholder="e.g. a friend, podcast…"/>`;
  body.appendChild(otherRow);

  row.querySelector('select').addEventListener('change', function(){
    otherRow.style.display = this.value==='Other' ? '' : 'none';
    if(this.value==='Other'){
      const inp = document.getElementById('f-source-other');
      if(inp){ inp.focus(); }
    }
  });
}

function buildPosterSection(posterUrl){
  const wrap = el('div','poster-section');
  const lbl = document.createElement('label'); lbl.textContent='Poster (optional)'; wrap.appendChild(lbl);
  const inner = el('div'); inner.id='posterSection'; wrap.appendChild(inner);

  function showUploadArea(){
    inner.innerHTML=`<div class="poster-upload-area" id="posterDropZone">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="color:var(--muted)"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
      <p>Click to upload or paste URL below</p>
      <input type="file" id="posterFileInput" accept="image/*" style="display:none"/>
      <div class="poster-url-row">
        <input class="poster-url-input" id="posterUrlInput" placeholder="https://…"/>
        <button class="poster-url-btn" type="button" onclick="setPosterFromUrl()">Set</button>
      </div>
    </div>`;
    inner.querySelector('#posterDropZone').onclick = function(e){
      if(e.target.tagName==='INPUT'||e.target.tagName==='BUTTON') return;
      inner.querySelector('#posterFileInput').click();
    };
    inner.querySelector('#posterFileInput').onchange = function(){
      const file=this.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>setFormPoster(ev.target.result);
      reader.readAsDataURL(file);
    };
  }

  function showPoster(url){
    inner.innerHTML='';
    const preview=el('div','poster-preview');
    const img=document.createElement('img'); img.src=url; img.alt='Poster';
    img.onerror=()=>showUploadArea();
    preview.appendChild(img);
    const rm=el('button','poster-remove'); rm.type='button'; rm.textContent='×';
    rm.onclick=()=>{ inner.dataset.url=''; showUploadArea(); };
    preview.appendChild(rm);
    inner.appendChild(preview);
    inner.dataset.url=url;
  }

  inner._showPoster = showPoster;

  if(posterUrl&&posterUrl!=='N/A') showPoster(posterUrl);
  else showUploadArea();

  return wrap;
}

function saveItem(){
  const c = getCat(catId);
  const titleVal = v('f-title').trim();
  if(!titleVal){ document.getElementById('f-title').focus(); return; }

  const posterEl = document.getElementById('posterSection');
  const posterUrl = posterEl ? (posterEl.dataset.url||'') : '';

  const existing = editId ? items.find(i=>i.id===editId) : null;

  const obj = {
    id: editId||uid(),
    cat: catId,
    status: existing ? existing.status : (tab==='done' ? 'done' : 'future'),
    doneDate: existing ? existing.doneDate : (tab==='done' ? new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : null),
    title: titleVal,
    year: v('f-year'),
    source: (()=>{ const p=document.getElementById('f-source-pick'); if(p) return p.value==='Other' ? (v('f-source-other')||'') : p.value; return v('f-source'); })()||'N/A',
    poster: posterUrl || (existing ? existing.poster : null),
  };

  if(c.subs.length) obj.sub = v('f-sub')||c.subs[0].id;

  // Star ratings
  const fMatch = document.getElementById('f-match');
  const fStarRating = document.getElementById('f-star-rating');
  if(fMatch) obj.match = parseInt(fMatch.value)||0;
  if(fStarRating) obj.rating = parseInt(fStarRating.value)||0;
  // preserve the other rating when editing
  if(!fMatch && existing) obj.match = existing.match||0;
  if(!fStarRating && existing) obj.rating = existing.rating||0;
  // review + liked aspects (from Just Did It or edit form)
  const fReview = document.getElementById('f-review');
  if(fReview) obj.review = fReview.value.trim();
  else if(existing) obj.review = existing.review||'';
  const fAspectsWrap = document.getElementById('f-aspects-wrap');
  if(fAspectsWrap) obj.likedAspects = [...fAspectsWrap.querySelectorAll('.jdi-aspect.on')].map(p=>p.textContent);
  else if(existing) obj.likedAspects = existing.likedAspects||[];

  if(c.id==='movies'||c.id==='tv-shows'){
    obj.director = v('f-director');
    obj.language = v('f-language');
    obj.imdbRating = v('f-imdb');
    obj.metacritic = v('f-metacritic');
    obj.actors = v('f-actors');
    obj.synopsis = v('f-synopsis');
    obj.trailer = v('f-trailer')||(existing?existing.trailer:null);
    obj.forKids = document.getElementById('f-kids')?.checked||false;
    obj.forWife = document.getElementById('f-wife')?.checked||false;
  }
  if(c.id==='books'){
    obj.author = v('f-author');
    obj.pages = v('f-pages');
    obj.language = v('f-language');
    obj.synopsis = v('f-synopsis');
    obj.kindleLink = v('f-kindle');
    obj.genres = selectedGenres();
  }
  if(c.id==='restaurants'){
    obj.cuisine    = v('f-cuisine');
    obj.city       = v('f-city');
    obj.country    = v('f-country');
    obj.mapsLink   = v('f-maps');
    obj.priceRange = v('f-price');
    obj.notes      = v('f-notes');
  }
  if(c.id==='local-trips'){
    obj.mapsLink    = v('f-maps');
    obj.tripType    = v('f-trip-type');
    obj.region      = v('f-region');
    obj.commute     = v('f-commute');
    obj.trailHours  = v('f-trail-hours');
    const waterEl   = document.querySelector('input[name="f-water"]:checked');
    obj.hasWater    = waterEl ? waterEl.value==='yes' : null;
    obj.bestSeason  = v('f-best-season');
    obj.notForKids  = document.getElementById('f-not-kids')?.checked||false;
    obj.description = v('f-description');
    obj.advice      = v('f-advice');
    obj.infoLink    = v('f-info-link');
    const pdfInp    = document.getElementById('f-pdf-input');
    if(pdfInp&&pdfInp.dataset.b64) obj.pdfData = pdfInp.dataset.b64;
    else if(existing) obj.pdfData = existing.pdfData||null;
  }
  if(c.id==='intl-trips'){
    obj.tripDesc     = v('f-trip-desc');
    obj.bestTime     = v('f-best-time');
    obj.tripDuration = v('f-trip-duration');
    obj.mustSee      = v('f-must-see');
    obj.weather      = v('f-weather');
    obj.notes        = v('f-notes');
  }
  if(c.id==='stuff'){
    obj.mode    = v('f-stuff-mode')||'to-buy';
    obj.notes   = v('f-notes');
    if(obj.mode==='to-buy'){
      obj.productUrl = v('f-product-url');
      obj.price      = v('f-price');
      obj.pros       = v('f-pros');

    } else {

  }

  if(editId && existing){ Object.assign(existing,obj); }
  else { items.push(obj); }
  save(); closeSheet(); renderContent();

async function fetchFromMaps(){
  const urlEl = document.getElementById('f-maps');
  const url = urlEl ? urlEl.value.trim() : '';
  if(!url){ setMapsStatus('Paste a Google Maps link first.'); return; }

  const key = localStorage.getItem('places_key');
  if(!key){ setMapsStatus('Save a Google Places API key first.'); return; }

  // Extract place name from URL path: /maps/place/Name/@...
  const nameMatch = url.match(/\/maps\/place\/([^/@?#]+)/);
  const query = nameMatch ? decodeURIComponent(nameMatch[1].replace(/\+/g,' ')) : '';
  if(!query){ setMapsStatus('Could not read place name from URL. Try a full Maps link.'); return; }

  setMapsStatus('Searching…');
  try{
    const res = await fetch('https://places.googleapis.com/v1/places:searchText',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'X-Goog-Api-Key': key,
        'X-Goog-FieldMask':'places.displayName,places.addressComponents,places.primaryTypeDisplayName,places.types,places.priceLevel,places.photos'
      },
      body: JSON.stringify({ textQuery: query, languageCode:'en' })
    });
    const data = await res.json();
    if(data.error){ setMapsStatus('API error: '+data.error.message); return; }
    const place = (data.places||[])[0];
    if(!place){ setMapsStatus('No results found.'); return; }

    // Name
    if(place.displayName) setField('f-title', place.displayName.text);

    // City + Country from address components
    let city='', country='';
    (place.addressComponents||[]).forEach(comp=>{
      if(comp.types.includes('locality'))                              city    = comp.longText;
      if(comp.types.includes('administrative_area_level_1') && !city) city    = comp.longText;
      if(comp.types.includes('country'))                              country = comp.longText;
    });
    if(city)    setField('f-city', city);
    if(country) setField('f-country', country);

    // Cuisine from primaryTypeDisplayName (e.g. "Italian restaurant" → "Italian")
    if(place.primaryTypeDisplayName){
      const raw = place.primaryTypeDisplayName.text||'';
      const cuisine = raw.replace(/\s*restaurant\b/i,'').trim();
      if(cuisine && !['food','establishment','restaurant'].includes(cuisine.toLowerCase())){
        setField('f-cuisine', cuisine);
      }
    }

    // Price level → our dropdown buckets
    const priceLevelMap = {
      PRICE_LEVEL_INEXPENSIVE: 'budget',
      PRICE_LEVEL_MODERATE:    'mid',
      PRICE_LEVEL_EXPENSIVE:   'upscale',
      PRICE_LEVEL_VERY_EXPENSIVE: 'fine'
    };
    if(place.priceLevel && priceLevelMap[place.priceLevel]){
      const sel = document.getElementById('f-price');
      if(sel) sel.value = priceLevelMap[place.priceLevel];
    }

    // Cover photo — fetch the redirect URL then set as poster
    if(place.photos && place.photos.length){
      setMapsStatus('Fetching cover image…');
      try{
        const photoName = place.photos[0].name;
        const photoRes = await fetch(
          `https://places.googleapis.com/v1/${photoName}/media?maxWidthPx=800&skipHttpRedirect=true&key=${key}`
        );
        const photoData = await photoRes.json();
        if(photoData.photoUri) setFormPoster(photoData.photoUri);
      } catch(_){}
    }

    setMapsStatus('✓ Done! Review and adjust the fields below.');
  } catch(e){ setMapsStatus('Error: '+e.message); }
}
