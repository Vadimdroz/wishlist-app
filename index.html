async function fetchIntlTripInfo(){
  const desc=(document.getElementById('f-trip-desc')||{}).value||'';
  if(!desc){ document.getElementById('itSmartStatus').textContent='Enter a trip description first.'; return; }
  const claudeKey=localStorage.getItem('claude_key')||CLAUDE_KEY_DEFAULT;

  document.getElementById('itSmartStatus').textContent='Thinking…';
  try{
    // Resolve which model to use — fetch the list and pick the cheapest/fastest available
    let modelId='claude-3-haiku-20240307';
    try{
      const mRes=await fetch('https://api.anthropic.com/v1/models',{
        headers:{'x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}
      });
      if(mRes.ok){
        const mData=await mRes.json();
        const ids=(mData.data||[]).map(m=>m.id);
        // Prefer haiku (cheapest/fastest), then sonnet, then anything
        const haiku=ids.find(id=>id.toLowerCase().includes('haiku'));
        const sonnet=ids.find(id=>id.toLowerCase().includes('sonnet'));
        modelId=haiku||sonnet||ids[0]||modelId;
      }
    }catch(_){}
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':claudeKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:modelId,
        max_tokens:800,
        messages:[{role:'user',content:`For this trip destination: "${desc}"\n\nYou must respond with ONLY a valid JSON object. No prose, no markdown, no code blocks. Just the raw JSON.\n\nRequired JSON keys:\n- "bestTime": string, best months/season to visit\n- "tripDuration": string, recommended trip length (e.g. "7-10 days")\n- "mustSee": string, top 3-5 must-see places separated by newlines\n- "weather": string, brief weather description\n- "locationQuery": string, main destination name in English for image search\n\nExample format:\n{"bestTime":"April to June","tripDuration":"7-10 days","mustSee":"Eiffel Tower\\nLouvre Museum\\nVersailles","weather":"Mild, 15-25°C in summer","locationQuery":"Paris France"}`}]
      })
    });
    if(!res.ok){
      const errText=await res.text();
      document.getElementById('itSmartStatus').textContent=`HTTP ${res.status}: ${errText.slice(0,150)}`;
      return;
    }
    const data=await res.json();
    if(data.type==='error'||data.error){ document.getElementById('itSmartStatus').textContent='API error: '+(data.error?.message||JSON.stringify(data.error)); return; }
    if(!data.content||!data.content[0]){ document.getElementById('itSmartStatus').textContent='Empty response (type='+data.type+').'; return; }
    let info;
    const rawText=data.content[0].text||'';
    try{
      // Try direct parse first, then strip markdown fences, then extract JSON block
      let cleaned=rawText.trim();
      if(cleaned.startsWith('```')){
        cleaned=cleaned.replace(/^```[a-z]*\n?/i,'').replace(/```\s*$/,'').trim();
      }
      // Try to extract a JSON object anywhere in the text
      if(!cleaned.startsWith('{')){
        const m=rawText.match(/\{[\s\S]*\}/);
        if(m) cleaned=m[0];
      }
      info=JSON.parse(cleaned);
    }catch(_){
      document.getElementById('itSmartStatus').textContent='Parse error — raw: '+rawText.slice(0,200);
      return;
    }

    if(info.bestTime)     setField('f-best-time',info.bestTime);
    if(info.tripDuration) setField('f-trip-duration',info.tripDuration);
    if(info.mustSee)      { const el=document.getElementById('f-must-see'); if(el) el.value=info.mustSee; }
    if(info.weather)      setField('f-weather',info.weather);

    // Auto-fill title from location if blank
    if(info.locationQuery&&!v('f-title')) setField('f-title',info.locationQuery);

    // Fetch cover image via Google Places
    const placesKey=localStorage.getItem('places_key');
    if(placesKey&&info.locationQuery){
      document.getElementById('itSmartStatus').textContent='Fetching cover image…';
      try{
        const pr=await fetch('https://places.googleapis.com/v1/places:searchText',{
          method:'POST',
          headers:{'Content-Type':'application/json','X-Goog-Api-Key':placesKey,
            'X-Goog-FieldMask':'places.photos'},
          body:JSON.stringify({textQuery:info.locationQuery,languageCode:'en'})
        });
        const pd=await pr.json();
        const photo=((pd.places||[])[0]||{}).photos;
        if(photo&&photo.length){
          const pmr=await fetch(`https://places.googleapis.com/v1/${photo[0].name}/media?maxWidthPx=800&skipHttpRedirect=true&key=${placesKey}`);
          const pmd=await pmr.json();
          if(pmd.photoUri) setFormPoster(pmd.photoUri);
        }
      }catch(_){}
    }
    document.getElementById('itSmartStatus').textContent='✓ Done! All fields are editable.';
  }catch(e){ document.getElementById('itSmartStatus').textContent='Error: '+e.message; }
}

function parseIso8601Duration(iso){
  if(!iso) return '';
  const m=iso.match(/PT?(?:(\d+)H)?(?:(\d+)M)?/i);
  if(!m) return iso;
  const h=parseInt(m[1]||0), min=parseInt(m[2]||0);
  if(h&&min) return `${h} hr ${min} min`;
  if(h) return `${h} hr`;
  if(min) return `${min} min`;
  return iso;
}

async function fetchRecipeInfo(){
  const url=(document.getElementById('f-recipe-url')||{}).value||'';
  const pasteTxt=(document.getElementById('f-recipe-paste')||{}).value||'';
  const setStatus=msg=>{ const e=document.getElementById('recipeSmartStatus'); if(e) e.textContent=msg; };

  if(!url&&!pasteTxt){ setStatus('Paste a recipe URL or paste recipe text in the field below the URL.'); return; }

  setStatus('Fetching recipe…');

  // ── Image helpers ─────────────────────────────────────────────────────────
  function extractSchemaImage(img){
    if(!img) return '';
    if(typeof img==='string') return img;
    if(Array.isArray(img)){ const f=img[0]; return typeof f==='string'?f:(f&&f.url)||''; }
    return img.url||'';
  }
  function extractOgImage(h){
    const m=h.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)
      ||h.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i);
    return m?m[1]:'';
  }
  // Extract a food-likely image from Jina markdown.
  // Author photos appear above the recipe title; we scan from the first heading downward.
  // Falls back to the full text if nothing found after the heading.
  function extractMarkdownImage(text){
    const skip=/avatar|author|profile|gravatar|logo|icon|headshot|bio|badge|banner|sprite/i;
    const scanFor=src=>{
      const re=/!\[[^\]]*\]\((https?:\/\/[^)]+)\)/g;
      let m;
      while((m=re.exec(src))!==null){ if(!skip.test(m[1])) return m[1]; }
      return '';
    };
    // Prefer images that appear after the first H1/H2 (recipe title area)
    const headingIdx=text.search(/^#{1,2}\s/m);
    if(headingIdx>0){
      const afterTitle=scanFor(text.slice(headingIdx));
      if(afterTitle) return afterTitle;
    }
    return scanFor(text);
  }

  // ── Strategy 1: Schema.org JSON-LD (works on AllRecipes, BBC Good Food, etc.)
  // Also always grab the image from HTML regardless of whether Schema.org succeeds
  let htmlForImage='';
  if(url){
    try{
      const proxyUrl='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxyUrl,{signal:AbortSignal.timeout(10000)});
      if(r.ok){
        const wrapper=await r.json();
        const html=wrapper.contents||'';
        htmlForImage=html;

        const ldMatches=[...html.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)];
        for(const m of ldMatches){
          try{
            let parsed=JSON.parse(m[1]);
            if(Array.isArray(parsed)) parsed=parsed.find(x=>x['@type']==='Recipe')||parsed[0];
            if(parsed&&(parsed['@type']==='Recipe'||parsed['@graph'])){
              const recipe=parsed['@type']==='Recipe'?parsed:(parsed['@graph']||[]).find(x=>x['@type']==='Recipe');
              if(recipe){
                const cuisine=Array.isArray(recipe.recipeCuisine)?recipe.recipeCuisine[0]:recipe.recipeCuisine||'';
                const totalTime=recipe.totalTime||(recipe.prepTime&&recipe.cookTime?null:recipe.prepTime||recipe.cookTime)||'';
                const prepTime=recipe.prepTime||'';
                const cookTime=recipe.cookTime||'';
                const timeStr=totalTime?parseIso8601Duration(totalTime)
                  :[prepTime&&`Prep: ${parseIso8601Duration(prepTime)}`,cookTime&&`Cook: ${parseIso8601Duration(cookTime)}`].filter(Boolean).join(' · ');
                const ingredients=(recipe.recipeIngredient||[]).join('\n');
                const name=recipe.name||'';
                const imgUrl=extractSchemaImage(recipe.image)||extractOgImage(html);
                const authorRaw=recipe.author;
                const authorName=Array.isArray(authorRaw)?(authorRaw[0]&&authorRaw[0].name||authorRaw[0]||''):(authorRaw&&authorRaw.name||authorRaw||'');

                if(cuisine) setField('f-cuisine',cuisine);
                if(name&&!v('f-title')) setField('f-title',name);
                if(authorName){ const byEl=document.getElementById('f-recipe-by'); if(byEl&&!byEl.value){ const cleaned=String(authorName).replace(/^@\S+$/,'').trim(); if(cleaned) byEl.value=cleaned; } }
                if(imgUrl) setFormPoster(imgUrl);
                let notes='';
                if(timeStr) notes+=`⏱ ${timeStr}\n\n`;
                if(ingredients) notes+=`🧂 Ingredients:\n${ingredients}`;
                if(notes){ const el=document.getElementById('f-notes'); if(el) el.value=notes.trim(); }
                setStatus('Done ✓');
                return;
              }
            }
          }catch(_){}
        }

        // Schema.org not found — still set OG image if available
        const ogImg=extractOgImage(html);
        if(ogImg) setFormPoster(ogImg);
      }
    }catch(_){}
  }

  // ── Strategy 2: AI fallback (Claude or Gemini)
  const claudeKey=localStorage.getItem('claude_key')||CLAUDE_KEY_DEFAULT;
  const geminiKey=localStorage.getItem('gemini_key')||'';
  if(!claudeKey&&!geminiKey){ setStatus('No recipe data found via Schema.org. Add a Claude or Gemini API key to use AI fallback.'); return; }

  setStatus('Reading recipe with AI…');
  let recipeText=pasteTxt;
  if(url&&!recipeText){
    try{
      const jinaRes=await fetch('https://r.jina.ai/'+url,{signal:AbortSignal.timeout(15000)});
      if(jinaRes.ok){
        recipeText=await jinaRes.text();
        // og:image is the site's chosen hero — for recipe pages this is almost always the dish photo
        // Fall back to first non-avatar markdown image from Jina output
        let imgFound=false;
        if(htmlForImage){ const ogImg2=extractOgImage(htmlForImage); if(ogImg2){ setFormPoster(ogImg2); imgFound=true; } }
        if(!imgFound){ const jinaImg=extractMarkdownImage(recipeText); if(jinaImg) setFormPoster(jinaImg); }
      }
    }catch(_){}
  }
  if(!recipeText){ setStatus('Could not fetch the recipe page. Try pasting the recipe text into the field above.'); return; }

  const prompt=`From this recipe text, extract the following and respond with ONLY a valid JSON object — no prose, no markdown:\n- "cuisine": cuisine type (e.g. "Italian", "Asian", "Middle Eastern") — empty string if unknown\n- "totalTime": total prep + cook time as a human string (e.g. "45 min", "1 hr 20 min") — empty string if unknown\n- "ingredients": ingredients as a newline-separated list, keep it concise\n- "name": recipe name — empty string if not clear\n- "author": recipe creator's real/display name (e.g. "Jamie Oliver", "Ottolenghi") — use the person's actual name, NOT a social media handle or @username; if only a handle is available return empty string\n\nRecipe text (first 3000 chars):\n${recipeText.slice(0,3000)}`;

  try{
    let rawText='';

    if(geminiKey){
      // Pick the best available model dynamically
      let geminiModel='gemini-2.0-flash';
      try{
        const mRes=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey}`);
        if(mRes.ok){
          const mData=await mRes.json();
          const ids=(mData.models||[]).map(m=>m.name.replace('models/',''));
          const pick=ids.find(m=>m.startsWith('gemini-2.0-flash'))||ids.find(m=>m.startsWith('gemini-1.5-flash'))||ids.find(m=>m.includes('flash'))||ids[0];
          if(pick) geminiModel=pick;
        }
      }catch(_){}
      const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
      });
      if(!res.ok){ const errText=await res.text(); setStatus('Gemini error: HTTP '+res.status+' — '+errText.slice(0,120)); return; }
      const data=await res.json();
      rawText=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    } else {
      let modelId='claude-3-haiku-20240307';
      try{
        const mRes=await fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}});
        if(mRes.ok){ const mData=await mRes.json(); const ids=(mData.data||[]).map(m=>m.id); modelId=ids.find(id=>id.includes('haiku'))||ids.find(id=>id.includes('sonnet'))||ids[0]||modelId; }
      }catch(_){}
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:modelId,max_tokens:600,messages:[{role:'user',content:prompt}]})
      });
      if(!res.ok){ setStatus('Claude error: HTTP '+res.status); return; }
      const data=await res.json();
      rawText=(data.content&&data.content[0]&&data.content[0].text)||'';
    }

    let cleaned=rawText.trim();
    if(cleaned.startsWith('```')) cleaned=cleaned.replace(/^```[a-z]*\n?/i,'').replace(/```\s*$/,'').trim();
    if(!cleaned.startsWith('{')){ const match=rawText.match(/\{[\s\S]*\}/); if(match) cleaned=match[0]; }
    const info=JSON.parse(cleaned);
    if(info.cuisine) setField('f-cuisine',info.cuisine);
    if(info.name&&!v('f-title')) setField('f-title',info.name);
    if(info.author){ const byEl=document.getElementById('f-recipe-by'); if(byEl&&!byEl.value){ const cleaned=String(info.author).replace(/^@\S+$/,'').trim(); if(cleaned) byEl.value=cleaned; } }
    let notes='';
    if(info.totalTime) notes+=`⏱ ${info.totalTime}\n\n`;
    if(info.ingredients) notes+=`🧂 Ingredients:\n${info.ingredients}`;
    if(notes){ const el=document.getElementById('f-notes'); if(el) el.value=notes.trim(); }
    setStatus('Done ✓');
  }catch(e){ setStatus('Error: '+e.message); }
}

function parseShopifyProduct(d){
  if(!d||!d.product) return null;
  const p=d.product;
  const title=(p.title||'').slice(0,120).trim();
  const image=p.images&&p.images[0]?p.images[0].src:'';
  const desc=p.body_html?(p.body_html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,400)):'';
  const variant=p.variants&&p.variants[0];
  const price=variant?'$'+parseFloat(variant.price).toFixed(2):'';
  return title?{title,image,desc,price}:null;
}

async function fetchProductInfo(url){
  // 1️⃣ Shopify: try .json endpoint directly, then via proxy (handles CORS/Cloudflare)
  if(/\/products\/[^?#]+/.test(url)){
    const jsonUrl=url.split('?')[0].replace(/\/$/,'')+'.json';
    // direct
    try{
      const r=await fetch(jsonUrl,{signal:AbortSignal.timeout(8000)});
      if(r.ok){ const result=parseShopifyProduct(await r.json()); if(result) return result; }
    }catch(_){}
    // via corsproxy
    try{
      const r=await fetch('https://corsproxy.io/?'+encodeURIComponent(jsonUrl),{signal:AbortSignal.timeout(10000)});
      if(r.ok){ const result=parseShopifyProduct(await r.json()); if(result) return result; }
    }catch(_){}
    // via allorigins (returns JSON wrapper)
    try{
      const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(jsonUrl),{signal:AbortSignal.timeout(10000)});
      if(r.ok){
        const wrapper=await r.json();
        if(wrapper.contents){ const result=parseShopifyProduct(JSON.parse(wrapper.contents)); if(result) return result; }
      }
    }catch(_){}
  }

  // 2️⃣ Microlink — headless-browser extraction
  try{
    const mlRes=await fetch('https://api.microlink.io/?url='+encodeURIComponent(url)+'&palette=false&audio=false&video=false&iframe=false',{signal:AbortSignal.timeout(10000)});
    if(mlRes.ok){
      const ml=await mlRes.json();
      if(ml.status==='success'&&ml.data){
        const d=ml.data;
        const title=(d.title||'').slice(0,120).trim();
        const image=d.image?.url||d.screenshot?.url||'';
        const desc=(d.description||'').slice(0,400).trim();
        const price=d.price||'';
        if(title||image) return {title,image,desc,price};
      }
    }
  }catch(_){}

  // 3️⃣ JSONLink open-graph extractor
  try{
    const jlRes=await fetch('https://jsonlink.io/api/extract?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(10000)});
    if(jlRes.ok){
      const jl=await jlRes.json();
      const title=(jl.title||'').slice(0,120).trim();
      const image=(jl.images&&jl.images[0])||'';
      const desc=(jl.description||'').slice(0,400).trim();
      if(title||image) return {title,image,desc,price:''};
    }
  }catch(_){}

  return null;
}

// NIS ⇄ USD conversion
let _ilsRate=null;
async function getIlsRate(){
  if(_ilsRate) return _ilsRate;
  // Try three independent free sources
  const sources=[
    async()=>{ const d=await(await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(5000)})).json(); return d.rates&&d.rates.ILS; },
    async()=>{ const d=await(await fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json',{signal:AbortSignal.timeout(5000)})).json(); return d.usd&&d.usd.ils; },
    async()=>{ const d=await(await fetch('https://api.frankfurter.app/latest?from=USD&to=ILS',{signal:AbortSignal.timeout(5000)})).json(); return d.rates&&d.rates.ILS; },
  ];
  for(const src of sources){
    try{ const r=await src(); if(r&&r>2&&r<10){ _ilsRate=r; return _ilsRate; } }catch(_){}
  }
  return 3.0;
}
window.convertStuffPrice=async function(){
  _ilsRate=null; // always fetch fresh rate
  const input=document.getElementById('f-price');
  const status=document.getElementById('priceConvStatus');
  if(!input) return;
  const raw=input.value.trim();
  if(!raw){ if(status) status.textContent='Enter a price first.'; return; }
  const num=parseFloat(raw.replace(/[^0-9.]/g,''));
  if(!num||isNaN(num)){ if(status) status.textContent='Could not read a number.'; return; }
  if(status) status.textContent='Getting rate…';
  const rate=await getIlsRate();
  const rateLabel=`(1 USD = ₪${rate.toFixed(2)})`;
  const isNis=/[₪]|(nis|ils)\s*$/i.test(raw);
  const isUsd=/[$]|(usd)\s*$/i.test(raw);
  if(isUsd&&!isNis){
    const nis=(num*rate).toFixed(2);
    input.value=`₪${nis}`;
    if(status) status.textContent=`$${num} → ₪${nis} ${rateLabel}`;
  } else {
    // NIS (explicit or assumed) → USD
    const usd=(num/rate).toFixed(2);
    input.value=`$${usd}`;
    if(status) status.textContent=`₪${num} → $${usd} ${rateLabel}`;
  }
};

async function stuffFetchProduct(){
  const url=(document.getElementById('f-product-url')||{}).value||'';
  if(!url){ document.getElementById('stuffFetchStatus').textContent='Paste a URL first.'; return; }
  const setStatus=msg=>{ document.getElementById('stuffFetchStatus').textContent=msg; };
  setStatus('Fetching…');

  // Run structured fetch + allorigins HTML grab in parallel
  const [info, htmlForImage] = await Promise.all([
    fetchProductInfo(url),
    fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(10000)})
      .then(r=>r.ok?r.json():{}).then(w=>w.contents||'').catch(()=>'')
  ]);

  let title=(info&&info.title)||'';
  let price=(info&&info.price)||'';
  let desc =(info&&info.desc)||'';
  let image=(info&&info.image)||'';

  // Supplement with og:image if strategy 1 returned no image
  function extractOgImg(h){ const m=h.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)||h.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i); return m?m[1]:''; }
  if(!image&&htmlForImage) image=extractOgImg(htmlForImage);

  // Try to extract price from HTML when Microlink/JSONLink didn't get it
  // Covers Schema.org offers.price, itemprop, Amazon a-price-whole, and generic patterns
  if(!price&&htmlForImage){
    const tryPrice=[
      // Schema.org JSON-LD offers.price
      ()=>{ try{ const lds=[...htmlForImage.matchAll(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi)]; for(const m of lds){ const d=JSON.parse(m[1]); const offers=(d.offers||(d['@graph']||[]).find(x=>x.offers)?.offers); if(offers){ const p=Array.isArray(offers)?offers[0]:offers; if(p.price) return '$'+p.price; } } }catch(_){} return ''; },
      // itemprop="price"
      ()=>{ const m=htmlForImage.match(/itemprop=["']price["'][^>]+content=["']([^"']+)["']/i)||htmlForImage.match(/content=["']([^"']+)["'][^>]+itemprop=["']price["']/i); return m?'$'+m[1]:''; },
      // Amazon: a-price-whole + a-price-fraction
      ()=>{ const w=htmlForImage.match(/class="a-price-whole">(\d+)/); const f=htmlForImage.match(/class="a-price-fraction">(\d+)/); return w?'$'+w[1]+(f?'.'+f[1]:''):''; },
      // Amazon: "priceAmount":"XX.XX"
      ()=>{ const m=htmlForImage.match(/"priceAmount"\s*:\s*"([^"]+)"/); return m?'$'+m[1]:''; },
      // Generic: "price":"XX.XX" in JSON blobs
      ()=>{ const m=htmlForImage.match(/"price"\s*:\s*"(\$?[\d.,]+)"/); return m?m[1]:''; },
    ];
    for(const fn of tryPrice){ const p=fn(); if(p&&p!=='$'){ price=p; break; } }
  }

  // AI fallback: always run if price is still missing (not just when title is missing)
  const needsAI=!title||!price;
  if(needsAI){
    const claudeKey=localStorage.getItem('claude_key')||CLAUDE_KEY_DEFAULT;
    const geminiKey=localStorage.getItem('gemini_key')||'';
    if(claudeKey||geminiKey){
      setStatus('Reading page with AI…');
      let pageText='';
      try{
        const jinaRes=await fetch('https://r.jina.ai/'+url,{signal:AbortSignal.timeout(15000)});
        if(jinaRes.ok) pageText=await jinaRes.text();
      }catch(_){}

      if(pageText){
        // Try image from markdown if still missing
        if(!image){
          const skip=/avatar|author|profile|gravatar|logo|icon|headshot|bio|badge|banner|sprite/i;
          const re=/!\[[^\]]*\]\((https?:\/\/[^)]+)\)/g; let m;
          while((m=re.exec(pageText))!==null){ if(!skip.test(m[1])){ image=m[1]; break; } }
        }

        const prompt=`From this product page text, extract the following and respond with ONLY a valid JSON object — no prose, no markdown:\n- "name": product name (concise) — empty string if unknown\n- "price": price with currency symbol as shown (e.g. "$49.99", "₪199") — empty string if not found\n- "pros": 2–4 key features or selling points as a short comma-separated list — empty string if unknown\n- "description": one-sentence description of what the product is — empty string if unknown\n\nProduct page text (first 3000 chars):\n${pageText.slice(0,3000)}`;

        try{
          let rawText='';
          if(geminiKey){
            let model='gemini-2.0-flash';
            try{ const mr=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey}`); if(mr.ok){ const md=await mr.json(); const ids=(md.models||[]).map(m=>m.name.replace('models/','')); const pick=ids.find(m=>m.startsWith('gemini-2.0-flash'))||ids.find(m=>m.startsWith('gemini-1.5-flash'))||ids.find(m=>m.includes('flash'))||ids[0]; if(pick) model=pick; } }catch(_){}
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
            if(!res.ok){ const e=await res.text(); setStatus('Gemini error: '+res.status+' — '+e.slice(0,100)); return; }
            const d=await res.json(); rawText=d?.candidates?.[0]?.content?.parts?.[0]?.text||'';
          } else {
            let modelId='claude-3-haiku-20240307';
            try{ const mr=await fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}}); if(mr.ok){ const md=await mr.json(); const ids=(md.data||[]).map(m=>m.id); modelId=ids.find(id=>id.includes('haiku'))||ids.find(id=>id.includes('sonnet'))||ids[0]||modelId; } }catch(_){}
            const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:modelId,max_tokens:400,messages:[{role:'user',content:prompt}]})});
            if(!res.ok){ setStatus('Claude error: '+res.status); return; }
            const d=await res.json(); rawText=(d.content&&d.content[0]&&d.content[0].text)||'';
          }
          if(rawText){
            let cleaned=rawText.trim();
            if(cleaned.startsWith('```')) cleaned=cleaned.replace(/^```[a-z]*\n?/i,'').replace(/```\s*$/,'').trim();
            if(!cleaned.startsWith('{')){ const match=rawText.match(/\{[\s\S]*\}/); if(match) cleaned=match[0]; }
            const ai=JSON.parse(cleaned);
            if(ai.name&&!title) title=ai.name;
            if(ai.price&&!price) price=ai.price;
            if(!desc) desc=ai.pros||ai.description||'';
          }
        }catch(_){}
      }
    }
  }

  // Apply whatever we found
  if(title&&!document.getElementById('f-title').value) setField('f-title',title);
  if(price) setField('f-price',price);
  if(desc){ const prosEl=document.getElementById('f-pros'); if(prosEl&&!prosEl.value) prosEl.value=desc; }

  if(image){
    setFormPoster(image);
    setStatus('✓ Done — review and edit fields.');
  } else if(title){
    setStatus('No image found — generating one…');
    const aiPr=encodeURIComponent('product photo of '+title+', clean white background, studio lighting, high quality');
    setFormPoster(`https://image.pollinations.ai/prompt/${aiPr}?width=400&height=400&nologo=true&seed=${Date.now()}`);
    setStatus('✓ Done — AI-generated image used (swap it if you have a better one).');
  } else {
    setStatus('Could not fetch — fill in title and the image will be generated automatically.');
  }
}

      try{ const jr=await fetch('https://r.jina.ai/'+url,{signal:AbortSignal.timeout(15000)}); if(jr.ok) pageText=await jr.text(); }catch(_){}
      if(pageText){
        if(!image){ const skip=/avatar|author|profile|gravatar|logo|icon|headshot|bio|badge|banner|sprite/i; const re=/!\[[^\]]*\]\((https?:\/\/[^)]+)\)/g; let m; while((m=re.exec(pageText))!==null){ if(!skip.test(m[1])){ image=m[1]; break; } } }
        const prompt=`From this product page text, extract the following and respond with ONLY a valid JSON object — no prose, no markdown:\n- "name": product name (concise) — empty string if unknown\n- "price": price with currency symbol (e.g. "$49.99", "₪199") — empty string if not found\n- "pros": 2–4 key features as a short comma-separated list — empty string if unknown\n- "description": one-sentence description — empty string if unknown\n\nProduct page text (first 3000 chars):\n${pageText.slice(0,3000)}`;
        try{
          let rawText='';
          if(geminiKey){
            let model='gemini-2.0-flash';
            try{ const mr=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${geminiKey}`); if(mr.ok){ const md=await mr.json(); const ids=(md.models||[]).map(m=>m.name.replace('models/','')); const pick=ids.find(m=>m.startsWith('gemini-2.0-flash'))||ids.find(m=>m.startsWith('gemini-1.5-flash'))||ids.find(m=>m.includes('flash'))||ids[0]; if(pick) model=pick; } }catch(_){}
            const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
            if(res.ok){ const d=await res.json(); rawText=d?.candidates?.[0]?.content?.parts?.[0]?.text||''; }
          } else {
            let modelId='claude-3-haiku-20240307';
            try{ const mr=await fetch('https://api.anthropic.com/v1/models',{headers:{'x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'}}); if(mr.ok){ const md=await mr.json(); const ids=(md.data||[]).map(m=>m.id); modelId=ids.find(id=>id.includes('haiku'))||ids.find(id=>id.includes('sonnet'))||ids[0]||modelId; } }catch(_){}
            const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':claudeKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:modelId,max_tokens:400,messages:[{role:'user',content:prompt}]})});
            if(res.ok){ const d=await res.json(); rawText=(d.content&&d.content[0]&&d.content[0].text)||''; }
          }
          if(rawText){
            let cleaned=rawText.trim();
            if(cleaned.startsWith('```')) cleaned=cleaned.replace(/^```[a-z]*\n?/i,'').replace(/```\s*$/,'').trim();
            if(!cleaned.startsWith('{')){ const match=rawText.match(/\{[\s\S]*\}/); if(match) cleaned=match[0]; }
            const ai=JSON.parse(cleaned);
            if(ai.name&&!name) name=ai.name;
            if(ai.price&&!price) price=ai.price;
            if(!desc) desc=ai.pros||ai.description||'';
          }
        }catch(_){}
      }
    }
  }

  const opt={ url, name:name||url, image, price, pros:'', desc };
  window._researchOptions.push(opt);
  renderResearchOptions();
  if(urlEl) urlEl.value='';
  setStatus(name?'✓ Added — paste next URL or save.':'Added (details not fetched — site may block bots).');
}

async function fetchFromMapsLocalTrip(){
  const urlEl=document.getElementById('f-maps');
  const url=urlEl?urlEl.value.trim():'';
  if(!url){ document.getElementById('ltMapsStatus').textContent='Paste a Google Maps link first.'; return; }
  const key=localStorage.getItem('places_key');
  if(!key){ document.getElementById('ltMapsStatus').textContent='Save a Google Places API key first.'; return; }
  // Resolve shortened mobile URLs
  let resolvedUrl=url;
  if(/goo\.gl\/|maps\.app\.goo\.gl/.test(url)){
    document.getElementById('ltMapsStatus').textContent='Resolving short link…';
    try{
      const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url),{signal:AbortSignal.timeout(10000)});
      const d=await r.json();
      if(d.status&&d.status.url) resolvedUrl=d.status.url;
    } catch(_){}
  }
  const nameMatch=resolvedUrl.match(/\/maps\/place\/([^/@?#]+)/);
  const qMatch=!nameMatch&&resolvedUrl.match(/[?&]q=([^&]+)/);
  const query=nameMatch?decodeURIComponent(nameMatch[1].replace(/\+/g,' ')):qMatch?decodeURIComponent(qMatch[1].replace(/\+/g,' ')):'';
  if(!query){ document.getElementById('ltMapsStatus').textContent='Could not read place name from URL.'; return; }
  document.getElementById('ltMapsStatus').textContent='Searching…';
  try{
    const res=await fetch('https://places.googleapis.com/v1/places:searchText',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,
        'X-Goog-FieldMask':'places.displayName,places.addressComponents,places.photos,places.location'},
      body:JSON.stringify({textQuery:query,languageCode:'en'})
    });
    const data=await res.json();
    if(data.error){ document.getElementById('ltMapsStatus').textContent='API error: '+data.error.message; return; }
    const place=(data.places||[])[0];
    if(!place){ document.getElementById('ltMapsStatus').textContent='No results found.'; return; }
    if(place.displayName) setField('f-title',place.displayName.text);
    let region='';
    (place.addressComponents||[]).forEach(comp=>{
      if(comp.types.includes('administrative_area_level_1')) region=comp.longText;
    });
    if(region) setField('f-region',region);
    // Store location for commute calc
    if(place.location) window._ltPlaceLocation=place.location;
    // Cover photo
    if(place.photos&&place.photos.length){
      document.getElementById('ltMapsStatus').textContent='Fetching image…';
      try{
        const pr=await fetch(`https://places.googleapis.com/v1/${place.photos[0].name}/media?maxWidthPx=800&skipHttpRedirect=true&key=${key}`);
        const pd=await pr.json();
        if(pd.photoUri) setFormPoster(pd.photoUri);
      }catch(_){}
    }
    document.getElementById('ltMapsStatus').textContent='✓ Done! Adjust fields below, then click 🧭 Calculate for commute.';
  }catch(e){ document.getElementById('ltMapsStatus').textContent='Error: '+e.message; }
}

async function calcCommute(){
  const key=localStorage.getItem('routes_key')||ROUTES_KEY_DEFAULT;
  let home=localStorage.getItem('home_address');
  if(!home){
    home=prompt('Enter your home address (stored locally):');
    if(!home) return;
    localStorage.setItem('home_address',home);
  }
  const dest=window._ltPlaceLocation;
  const mapsUrl=(document.getElementById('f-maps')||{}).value||'';
  if(!dest&&!mapsUrl){ document.getElementById('commuteSt').textContent='Fetch place data first.'; return; }
  document.getElementById('commuteSt').textContent='Calculating…';
  try{
    const destination=dest
      ? {location:{latLng:{latitude:dest.latitude,longitude:dest.longitude}}}
      : {address:(document.getElementById('f-title')||{}).value||mapsUrl};
    const res=await fetch('https://routes.googleapis.com/directions/v2:computeRoutes',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Goog-Api-Key':key,
        'X-Goog-FieldMask':'routes.duration,routes.distanceMeters'},
      body:JSON.stringify({origin:{address:home},destination,travelMode:'DRIVE',routingPreference:'TRAFFIC_UNAWARE'})
    });
    const data=await res.json();
    if(data.error){ document.getElementById('commuteSt').textContent='Routes API error — enable it in Google Cloud Console.'; return; }
    const route=(data.routes||[])[0];
    if(!route){ document.getElementById('commuteSt').textContent='No route found.'; return; }
    const secs=parseInt(route.duration)||0;
    const km=Math.round((route.distanceMeters||0)/1000);
    const h=Math.floor(secs/3600), m=Math.round((secs%3600)/60);
    const dur=h>0?`${h}h ${m}min`:`${m}min`;
    const result=`${dur} (${km} km)`;
    setField('f-commute',result);
    document.getElementById('commuteSt').textContent='✓ '+result;
  }catch(e){ document.getElementById('commuteSt').textContent='Error: '+e.message; }
}

async function searchOpenLibrary(title){
  setSmartStatus('Searching Open Library…');
  document.getElementById('pickerContainer').innerHTML='';

async function fetchAndApplyBook(book){
  let description='';
  if(book.key){
    try{
      const wRes=await fetch(`https://openlibrary.org${book.key}.json`);
      const wData=await wRes.json();
      if(wData.description) description=typeof wData.description==='string'?wData.description:(wData.description.value||'');
    } catch(e){}
  }
  setField('f-title',book.title);
  setField('f-author',book.author_name&&book.author_name[0]||'');
  setField('f-year',book.first_publish_year||'');
  setField('f-pages',book.number_of_pages_median||'');
  const langs=book.language||[];
  setField('f-language',langs.includes('eng')?'English':langs[0]||'');
  if(description) setField('f-synopsis',description);
  const kindleQ=encodeURIComponent(book.title+(book.author_name?' '+book.author_name[0]:''));
  setField('f-kindle',`https://www.amazon.com/s?k=${kindleQ}&i=digital-text`);
  if(book.cover_i) setFormPoster(`https://covers.openlibrary.org/b/id/${book.cover_i}-L.jpg`);
  setSmartStatus('Done!');
}

async function fetchTrailer(query){
  try{
    const res=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&maxResults=1&key=${YT_KEY}`);
    const data=await res.json();
    const vid=data.items&&data.items[0]&&data.items[0].id&&data.items[0].id.videoId;
    if(vid){
      const url='https://www.youtube.com/watch?v='+vid;
      setField('f-trailer',url);
      // Insert thumb after trailer input row
      const trailerInput=document.getElementById('f-trailer');
      if(trailerInput){
        const parent=trailerInput.closest('.form-row');
        if(parent){
          // Remove any existing thumb
          if(parent.nextSibling&&parent.nextSibling._isTrailerThumb) parent.nextSibling.remove();
          const thumbWrap=el('div'); thumbWrap.style.marginBottom='14px'; thumbWrap._isTrailerThumb=true;
          thumbWrap.appendChild(buildTrailerThumb(vid));
          parent.after(thumbWrap);
        }
      }
    }
    setSmartStatus('Done!');
  } catch(e){ setSmartStatus('Done (no trailer found)'); }
}

async function quickSearch(q){
  const omdbKey = localStorage.getItem('omdb_key') || OMDB_KEY_DEFAULT;
  const [movRes, tvRes, bookRes] = await Promise.allSettled([
    fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=movie&apikey=${omdbKey}`).then(r=>r.json()),
    fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(q)}&type=series&apikey=${omdbKey}`).then(r=>r.json()),
    fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(q)}&limit=4&fields=key,title,author_name,first_publish_year,cover_i`).then(r=>r.json()),
  ]);

  const results = [];
  if (movRes.status==='fulfilled' && movRes.value.Response==='True')
    (movRes.value.Search||[]).slice(0,3).forEach(r => results.push({...r, _cat:'movies', _badge:'🎬 Movie'}));
  if (tvRes.status==='fulfilled' && tvRes.value.Response==='True')
    (tvRes.value.Search||[]).slice(0,3).forEach(r => results.push({...r, _cat:'tv-shows', _badge:'📺 TV'}));
  if (bookRes.status==='fulfilled')
    (bookRes.value.docs||[]).slice(0,3).forEach(r => results.push({
      Title: r.title, Year: r.first_publish_year,
      Poster: r.cover_i ? `https://covers.openlibrary.org/b/id/${r.cover_i}-M.jpg` : 'N/A',
      _author: (r.author_name||[])[0]||'', _cat:'books', _badge:'📚 Book'
    }));

  const statusEl = document.getElementById('qaStatus');
  const resultsEl = document.getElementById('qaResults');
  if (!statusEl || !resultsEl) return;

  if (!results.length) {
    statusEl.textContent = 'No matches — pick a category below to add manually.';
    resultsEl.innerHTML = '';
    return;
  }
  statusEl.textContent = '';
  resultsEl.innerHTML = '';
  results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'qa-result';
    const hasPoster = r.Poster && r.Poster !== 'N/A';
    const posterHtml = hasPoster
      ? `<img class="qa-result-poster" src="${esc(r.Poster)}" onerror="this.style.display='none'">`
      : `<div class="qa-result-poster-ph">${r._cat==='movies'?'🎬':r._cat==='tv-shows'?'📺':'📚'}</div>`;
    row.innerHTML = `${posterHtml}
      <div class="qa-result-info">
        <div class="qa-result-title">${esc(r.Title||'')}</div>
        <div class="qa-result-sub">${r._author?esc(r._author)+' · ':''}${r.Year||''}</div>
      </div>
      <span class="qa-result-badge">${r._badge}</span>`;
    row.onclick = () => quickSaveResult(r);
    resultsEl.appendChild(row);
  });
}

async function quickSaveResult(r){
  const statusEl = document.getElementById('qaStatus');
  if (statusEl) statusEl.textContent = 'Saving…';

  if (r._cat === 'books') {
    const newItem = {
      id: Date.now().toString(), cat:'books', status:'future',
      title: r.Title, year: r.Year ? String(r.Year) : '',
      poster: r.Poster && r.Poster !== 'N/A' ? r.Poster : '',
      author: r._author || '',
    };
    items.unshift(newItem); save();
    closeSheet(); catId = 'books'; renderContent();
    return;
  }

  // Movies / TV — fetch full OMDB detail
  const omdbKey = localStorage.getItem('omdb_key') || OMDB_KEY_DEFAULT;
  try {
    const res = await fetch(`https://www.omdbapi.com/?i=${r.imdbID}&apikey=${omdbKey}`);
    const d = await res.json();
    const newItem = {
      id: Date.now().toString(), cat: r._cat, status:'future',
      title: d.Title||r.Title, year: d.Year||'',
      poster: d.Poster&&d.Poster!=='N/A' ? d.Poster : '',
      director: d.Director&&d.Director!=='N/A' ? d.Director : '',
      actors: d.Actors&&d.Actors!=='N/A' ? d.Actors : '',
      language: d.Language&&d.Language!=='N/A' ? d.Language : '',
      imdbRating: d.imdbRating&&d.imdbRating!=='N/A' ? d.imdbRating : '',
      metacritic: d.Metascore&&d.Metascore!=='N/A' ? d.Metascore : '',
      synopsis: d.Plot&&d.Plot!=='N/A' ? d.Plot : '',
    };
    items.unshift(newItem); save();
    closeSheet(); catId = r._cat; renderContent();
  } catch(e) {
    const newItem = {
      id: Date.now().toString(), cat: r._cat, status:'future',
      title: r.Title, year: r.Year||'',
      poster: r.Poster&&r.Poster!=='N/A' ? r.Poster : '',
    };
    items.unshift(newItem); save();
    closeSheet(); catId = r._cat; renderContent();
  }
}

// ─── Sheet open/close ─────────────────────────────────────────────────────────
function openSheet(){
  document.getElementById('sheetOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSheet(){
  editId=null;
  document.getElementById('sheetOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function overlayClick(e){
  // do not close on outside click — only explicit Cancel/X closes the sheet
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey) && e.key==='Enter'){
    const overlay = document.getElementById('sheetOverlay');
    if(!overlay || !overlay.classList.contains('open')) return;
    e.preventDefault();
    // find and click the primary save/action button
    const saveBtn = document.querySelector('#sheetActions .sheet-save');
    if(saveBtn) saveBtn.click();
  }
});

// ─── JSON Export / Import ─────────────────────────────────────────────────────
function exportJSON(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `wishlist-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const data = JSON.parse(e.target.result);
      const imported = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : null);
      if(!imported) throw new Error('Unrecognised format');
      // Merge: keep existing items not in the import, add all imported items
      const existingIds = new Set(items.map(i => i.id));
      const newItems = imported.filter(i => !existingIds.has(i.id));
      items = [...items, ...newItems];
      save();
      renderContent();
      alert(`Imported ${newItems.length} new items (${imported.length - newItems.length} duplicates skipped).`);
    } catch(err){ alert('Import failed: ' + err.message); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ─── CSV Export ───────────────────────────────────────────────────────────────
function exportCSV(){
  const cols = [
    'Category','Title','Status','Year','Source','Rating','Match',
    'Director','Author','Cuisine','City','Country','Price Range',
    'Visit Date','Done Date','Liked Aspects','Favourite Dishes',
    'Review','Notes','Genres','Poster'
  ];
  const priceLabels={budget:'Up to $30',mid:'$30–$75',upscale:'$75–$150',fine:'Above $150'};

  const rows = items.map(item => {
    const c = getCat(item.cat);
    return [
      c.label,
      item.title||'',
      item.status||'',
      item.year||'',
      (item.source&&item.source!=='N/A') ? item.source : '',
      item.rating||'',
      item.match||'',
      item.director||'',
      item.author||'',
      item.cuisine||'',
      item.city||'',
      item.country||'',
      item.priceRange ? (priceLabels[item.priceRange]||item.priceRange) : '',
      item.visitDate||'',
      item.doneDate||'',
      (item.likedAspects||[]).join('; '),
      (item.favDishes||[]).join('; '),
      item.review||'',
      item.notes||'',
      (item.genres||[]).join('; '),
      item.poster||''
    ].map(val => `"${String(val).replace(/"/g,'""')}"`);
  });

  const csv = [cols.map(c=>`"${c}"`).join(','), ...rows.map(r=>r.join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `wishlist-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ─── Auto Backup (every 24 hours) ────────────────────────────────────────────
function autoBackup(){
  const INTERVAL = 24 * 60 * 60 * 1000;
  const last = parseInt(localStorage.getItem('wl_last_backup') || '0');
  if(Date.now() - last < INTERVAL) return;
  const cols = [
    'Category','Title','Status','Year','Source','Rating','Match',
    'Director','Author','Cuisine','City','Country','Price Range',
    'Visit Date','Done Date','Liked Aspects','Favourite Dishes',
    'Review','Notes','Genres','Poster'
  ];
  const priceLabels={budget:'Up to $30',mid:'$30–$75',upscale:'$75–$150',fine:'Above $150'};
  const rows = items.map(item => {
    const c = getCat(item.cat);
    return [
      c.label, item.title||'', item.status||'', item.year||'',
      (item.source&&item.source!=='N/A') ? item.source : '',
      item.rating||'', item.match||'', item.director||'', item.author||'',
      item.cuisine||'', item.city||'', item.country||'',
      item.priceRange ? (priceLabels[item.priceRange]||item.priceRange) : '',
      item.visitDate||'', item.doneDate||'',
      (item.likedAspects||[]).join('; '), (item.favDishes||[]).join('; '),
      item.review||'', item.notes||'', (item.genres||[]).join('; '), item.poster||''
    ].map(val => `"${String(val).replace(/"/g,'""')}"`);
  });
  const csv = [cols.map(c=>`"${c}"`).join(','), ...rows.map(r=>r.join(','))].join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `wishlist-backup-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  localStorage.setItem('wl_last_backup', Date.now().toString());
}

    alert('Sign-in failed: ' + e.message);

function doSignOut(){
  if (_auth) _auth.signOut();
}

if (_auth) {
  _auth.onAuthStateChanged(async user => {
    if (user) {
      currentUser = user;
      const avatar = document.getElementById('navUserAvatar');
      if (avatar && user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
      const signOutBtn = document.getElementById('navSignOutBtn');
      if (signOutBtn) signOutBtn.style.display = 'flex';
      try {
        const snap = await _db.collection('users').doc(user.uid)
          .collection('data').doc('wishlist').get();
        if (snap.exists && Array.isArray(snap.data().items)) {
          const remoteItems = snap.data().items;
          const localItems = JSON.parse(localStorage.getItem('wl_v3') || '[]');
          const localById = Object.fromEntries(localItems.map(i => [i.id, i]));
          const remoteById = Object.fromEntries(remoteItems.map(i => [i.id, i]));

          // For each remote item, prefer the local version if it has more populated
          // fields (e.g. API data that failed to reach Firestore due to size limits).
          // Also restore base64 posters that were stripped before pushing.
          const countFields = obj => Object.values(obj).filter(v => v != null && v !== '' && v !== 'N/A').length;
          const merged = remoteItems.map(remote => {
            const local = localById[remote.id];
            if (!local) return remote;
            const base = countFields(local) >= countFields(remote) ? { ...remote, ...local } : { ...local, ...remote };
            // Always restore local base64 poster if remote stripped it
            if (!base.poster && local.poster) base.poster = local.poster;
            return base;
          });
          // Add any local-only items not yet in Firestore
          localItems.forEach(local => { if (!remoteById[local.id]) merged.push(local); });

          items = merged;
          localStorage.setItem('wl_v3', JSON.stringify(items));
        } else {
          // First sign-in: push existing localStorage data to Firestore
          await pushToFirestore();
        }
      } catch(e){ console.warn('Firestore load failed, using localStorage:', e); }
      // Load synced API keys — remote wins so mobile gets keys saved on desktop
      try {
        const settingsSnap = await _db.collection('users').doc(user.uid)
          .collection('data').doc('settings').get();
        if (settingsSnap.exists) {
          const s = settingsSnap.data();
          SETTINGS_KEYS.forEach(k => { if (s[k]) localStorage.setItem(k, s[k]); });
        }
      } catch(e){ console.warn('Settings load failed:', e); }
      document.getElementById('authOverlay').style.display = 'none';
      renderContent();
      autoBackup();
    } else {
      currentUser = null;
      const signOutBtn = document.getElementById('navSignOutBtn');
      if (signOutBtn) signOutBtn.style.display = 'none';
      document.getElementById('authOverlay').style.display = 'flex';
    }
  });
} else {
  // Firebase failed to initialize — show sign-in screen (will show error on click)
  document.getElementById('authOverlay').style.display = 'flex';
}
