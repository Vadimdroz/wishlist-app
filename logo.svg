<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background pill -->
  <rect width="120" height="120" rx="28" fill="#0d0d14"/>

  <!-- ── Stem ── -->
  <path d="M44 68 Q40 82 35 100" stroke="#c8b97a" stroke-width="2.4" stroke-linecap="round"/>

  <!-- ── Dandelion head centre ── -->
  <circle cx="44" cy="65" r="4.5" fill="white"/>

  <!-- ── Seed spokes (8 directions, each = thin line + fluffy tip) ── -->
  <!-- Up -->
  <line x1="44" y1="65" x2="44" y2="42" stroke="white" stroke-width="1.4"/>
  <circle cx="44" cy="40" r="3.2" fill="white"/>
  <line x1="41" y1="40" x2="44" y2="37" stroke="white" stroke-width="0.8"/>
  <line x1="44" y1="37" x2="47" y2="40" stroke="white" stroke-width="0.8"/>

  <!-- Upper-left -->
  <line x1="44" y1="65" x2="27" y2="50" stroke="white" stroke-width="1.4"/>
  <circle cx="25.5" cy="48.5" r="3.2" fill="white"/>
  <line x1="23" y1="48" x2="25.5" y2="45" stroke="white" stroke-width="0.8"/>
  <line x1="25.5" y1="45" x2="28" y2="48" stroke="white" stroke-width="0.8"/>

  <!-- Left -->
  <line x1="44" y1="65" x2="21" y2="65" stroke="white" stroke-width="1.4"/>
  <circle cx="19" cy="65" r="3.2" fill="white"/>
  <line x1="19" y1="61.5" x2="19" y2="65" stroke="white" stroke-width="0.8"/>
  <line x1="19" y1="65" x2="19" y2="68.5" stroke="white" stroke-width="0.8"/>

  <!-- Lower-left -->
  <line x1="44" y1="65" x2="27" y2="80" stroke="white" stroke-width="1.4"/>
  <circle cx="25.5" cy="81.5" r="3.2" fill="white"/>
  <line x1="22.5" y1="81.5" x2="25.5" y2="84.5" stroke="white" stroke-width="0.8"/>
  <line x1="25.5" y1="84.5" x2="28.5" y2="81.5" stroke="white" stroke-width="0.8"/>

  <!-- Down -->
  <line x1="44" y1="65" x2="44" y2="84" stroke="white" stroke-width="1.4" opacity="0.6"/>
  <circle cx="44" cy="86" r="3.2" fill="white" opacity="0.6"/>

  <!-- Upper-right — partially blown, fading -->
  <line x1="44" y1="65" x2="59" y2="50" stroke="white" stroke-width="1.4" opacity="0.45"/>
  <circle cx="60.5" cy="48.5" r="3.2" fill="white" opacity="0.45"/>

  <!-- Right — blown away -->
  <line x1="44" y1="65" x2="62" y2="65" stroke="white" stroke-width="1.4" opacity="0.25"/>
  <circle cx="64" cy="65" r="3.2" fill="white" opacity="0.25"/>

  <!-- Lower-right — blown away -->
  <line x1="44" y1="65" x2="57" y2="78" stroke="white" stroke-width="1.4" opacity="0.2"/>

  <!-- ══ Flying seeds (travelling upper-right, fading with distance) ══ -->
  <!-- Each seed: small dark dot (body) → thin stalk → fluffy crown -->

  <!-- Seed 1 — close -->
  <g opacity="0.92">
    <circle cx="74" cy="54" r="1.4" fill="#c8b97a"/>
    <line x1="74" y1="54" x2="76" y2="45" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
    <circle cx="76.5" cy="43" r="2.8" fill="white"/>
    <line x1="74" y1="43" x2="76.5" y2="40.5" stroke="white" stroke-width="0.7"/>
    <line x1="76.5" y1="40.5" x2="79" y2="43" stroke="white" stroke-width="0.7"/>
  </g>

  <!-- Seed 2 -->
  <g opacity="0.75">
    <circle cx="84" cy="40" r="1.2" fill="#c8b97a"/>
    <line x1="84" y1="40" x2="86" y2="31" stroke="white" stroke-width="1" stroke-linecap="round"/>
    <circle cx="86.5" cy="29" r="2.5" fill="white"/>
    <line x1="84.2" y1="29" x2="86.5" y2="26.8" stroke="white" stroke-width="0.65"/>
    <line x1="86.5" y1="26.8" x2="88.8" y2="29" stroke="white" stroke-width="0.65"/>
  </g>

  <!-- Seed 3 -->
  <g opacity="0.58">
    <circle cx="93" cy="55" r="1.1" fill="#c8b97a"/>
    <line x1="93" y1="55" x2="95" y2="47" stroke="white" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="95.5" cy="45.5" r="2.2" fill="white"/>
    <line x1="93.5" y1="45.5" x2="95.5" y2="43.5" stroke="white" stroke-width="0.6"/>
    <line x1="95.5" y1="43.5" x2="97.5" y2="45.5" stroke="white" stroke-width="0.6"/>
  </g>

  <!-- Seed 4 — upper area, drifting high -->
  <g opacity="0.5">
    <circle cx="88" cy="22" r="1" fill="#c8b97a"/>
    <line x1="88" y1="22" x2="90" y2="14" stroke="white" stroke-width="0.9" stroke-linecap="round"/>
    <circle cx="90.5" cy="12.5" r="2" fill="white"/>
    <line x1="88.7" y1="12.5" x2="90.5" y2="10.7" stroke="white" stroke-width="0.55"/>
    <line x1="90.5" y1="10.7" x2="92.3" y2="12.5" stroke="white" stroke-width="0.55"/>
  </g>

  <!-- Seed 5 — far right, small -->
  <g opacity="0.35">
    <circle cx="103" cy="34" r="0.9" fill="#c8b97a"/>
    <line x1="103" y1="34" x2="105" y2="27" stroke="white" stroke-width="0.8" stroke-linecap="round"/>
    <circle cx="105.5" cy="25.5" r="1.7" fill="white"/>
  </g>

  <!-- Seed 6 — highest, almost gone -->
  <g opacity="0.2">
    <circle cx="98" cy="10" r="0.8" fill="#c8b97a"/>
    <line x1="98" y1="10" x2="100" y2="4" stroke="white" stroke-width="0.7" stroke-linecap="round"/>
    <circle cx="100.5" cy="3" r="1.4" fill="white"/>
  </g>
</svg>
